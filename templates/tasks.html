<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>D8Q - 任务管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",sans-serif;background:#f0f2f5;color:#333}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:24px 0;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:28px;font-weight:600;letter-spacing:2px}
.header p{margin-top:6px;opacity:.8;font-size:14px}
.nav{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 20px;display:flex;justify-content:center;gap:0}
.nav a{display:inline-block;padding:12px 28px;font-size:15px;color:#666;text-decoration:none;border-bottom:2px solid transparent;transition:all .2s}
.nav a:hover{color:#1890ff}
.nav a.active{color:#1890ff;border-bottom-color:#1890ff;font-weight:500}
.container{max-width:1100px;margin:0 auto;padding:20px}
.section{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;margin-bottom:20px}
.section-header{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.section-header h3{font-size:16px;color:#333}
.section table{width:100%;border-collapse:collapse}
.section th{background:#fafafa;padding:12px 16px;text-align:left;font-size:13px;color:#666;font-weight:500;border-bottom:1px solid #f0f0f0}
.section td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f0f0f0}
.section tr:last-child td{border-bottom:none}
.section tr:hover td{background:#fafafa}
.btn{padding:8px 20px;background:#1890ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;transition:background .2s}
.btn:hover{background:#40a9ff}
.btn-danger{background:#ff4d4f}.btn-danger:hover{background:#ff7875}
.btn-success{background:#52c41a}.btn-success:hover{background:#73d13d}
.btn-orange{background:#fa8c16}.btn-orange:hover{background:#ffa940}
.btn-purple{background:#722ed1}.btn-purple:hover{background:#9254de}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-ghost{background:transparent;color:#1890ff;border:1px solid #1890ff}.btn-ghost:hover{background:#e6f7ff}
.actions{display:flex;gap:6px}
.source-tag{background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:12px;color:#666;display:inline-block;margin:1px}
.style-tag{padding:2px 8px;border-radius:4px;font-size:12px;display:inline-block}
.style-news{background:#e6f7ff;color:#1890ff}.style-deep{background:#f9f0ff;color:#722ed1}.style-invest{background:#fff7e6;color:#fa8c16}
.freq-tag{background:#f6ffed;color:#52c41a;padding:2px 8px;border-radius:4px;font-size:12px}
.empty{text-align:center;padding:40px;color:#999;font-size:14px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;width:520px;max-width:90vw}
.modal h3{font-size:18px;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;color:#555;margin-bottom:6px;font-weight:500}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#1890ff}
.form-group .hint{font-size:12px;color:#999;margin-top:4px}
.checkbox-group{display:flex;gap:16px;flex-wrap:wrap}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:6px;font-size:14px;z-index:2000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-success{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.toast-error{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
.toast-info{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
</style>
</head>
<body>
<div class="header"><h1>📊 D8Q 智能资讯工厂</h1><p>Intelligent Engine DataFactory</p></div>
<div class="nav">
  <a href="/">📰 资讯浏览</a><a href="/tasks" class="active">⚙️ 任务管理</a>
  <a href="/stock">📈 股票分析</a><a href="/report">📑 研报分析</a>
</div>
<div class="container">
  <div class="section"><div class="section-header"><h3>📥 采集任务</h3><button class="btn" onclick="openCollectModal()">+ 新建采集任务</button></div><div id="collectTable"><div class="empty">加载中...</div></div></div>
  <div class="section"><div class="section-header"><h3>✍️ 创作任务</h3><button class="btn btn-purple" onclick="openCreationModal()">+ 新建创作任务</button></div><div id="creationTable"><div class="empty">加载中...</div></div></div>
  <div class="section"><div class="section-header"><h3>📤 发布任务</h3><button class="btn btn-orange" onclick="openPublishModal()">+ 新建发布任务</button></div><div id="publishTable"><div class="empty">加载中...</div></div></div>
</div>

<!-- 采集任务弹窗 -->
<div class="modal-overlay" id="collectModal"><div class="modal">
  <h3 id="cModalTitle">新建采集任务</h3>
  <input type="hidden" id="cEditId">
  <div class="form-group"><label>采集主题 *</label><input type="text" id="cSubject" placeholder="如：AI、具身智能"></div>
  <div class="form-group"><label>数据来源</label><div class="checkbox-group" id="cSources">
    <label><input type="checkbox" value="cailianshe" checked> 财联社</label>
    <label><input type="checkbox" value="nbd" checked> 每经网</label>
    <label><input type="checkbox" value="36kr" checked> 36氪</label>
    <label><input type="checkbox" value="weibo" checked> 微博</label>
  </div></div>
  <div class="form-group"><label>调度频率</label><select id="cCron">
    <option value="0 */1 * * *">每隔1小时</option>
    <option value="0 */2 * * *" selected>每隔2小时</option>
    <option value="0 */3 * * *">每隔3小时</option>
    <option value="0 */4 * * *">每隔4小时</option>
    <option value="0 */6 * * *">每隔6小时</option>
    <option value="0 */8 * * *">每隔8小时</option>
    <option value="0 */12 * * *">每隔12小时</option>
    <option value="0 8,12,18 * * *">每天3次（8、12、18点）</option>
    <option value="0 8,20 * * *">每天2次（8、20点）</option>
    <option value="0 9 * * *">每天1次（9点）</option>
    <option value="0 9 * * 1-5">工作日每天1次（9点）</option>
    <option value="0 9 * * 0">每周日1次（9点）</option>
  </select>
  <div class="hint">修改调度频率将在第二天生效。</div></div>
  <div class="form-group"><label>每次最大采集数</label><input type="number" id="cMax" value="20" min="1" max="100"></div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeAll()">取消</button><button class="btn" onclick="saveCollect()">保存</button></div>
</div></div>

<!-- 创作任务弹窗 -->
<div class="modal-overlay" id="creationModal"><div class="modal">
  <h3 id="crModalTitle">新建创作任务</h3>
  <input type="hidden" id="crEditId">
  <div class="form-group"><label>主题 *</label><select id="crSubject"></select></div>
  <div class="form-group"><label>文章风格</label><select id="crStyle">
    <option value="news_brief">📋 资讯速递（简洁列表）</option>
    <option value="deep_analysis">🔍 深度分析（带观点）</option>
    <option value="investment_weekly">📊 投资周报（数据+趋势）</option>
  </select></div>
  <div class="form-group"><label>创作频率</label><select id="crFreq">
    <option value="daily">每日（过去24小时资讯）</option>
    <option value="weekly">每周（过去7天资讯）</option>
    <option value="monthly">每月（过去30天资讯）</option>
  </select>
  <div class="hint">修改频率将在下一个任务周期生效。</div></div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeAll()">取消</button><button class="btn btn-purple" onclick="saveCreation()">保存</button></div>
</div></div>

<!-- 发布任务弹窗 -->
<div class="modal-overlay" id="publishModal"><div class="modal">
  <h3 id="pubModalTitle">新建发布任务</h3>
  <input type="hidden" id="pubEditId">
  <div class="form-group"><label>主题 *</label><select id="pubSubject"></select></div>
  <div class="form-group"><label>发布渠道</label><select id="pubChannel"><option value="xiaohongshu">小红书</option></select></div>
  <div class="form-group"><label>发布频率</label><select id="pubFreq">
    <option value="daily">每日</option><option value="weekly">每周</option><option value="monthly">每月</option>
  </select>
  <div class="hint">修改频率将在下一个任务周期生效。</div></div>
  <div class="form-group"><label>发布账号</label><input type="text" value="内置账号（未来材料研究所）" disabled><div class="hint">当前使用内置账号</div></div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeAll()">取消</button><button class="btn btn-orange" onclick="savePublish()">保存</button></div>
</div></div>

<div class="toast" id="toast"></div>
<script>
var ALL_SOURCES=["cailianshe","nbd","36kr","weibo"];
var STYLE_NAMES={"news_brief":"资讯速递","deep_analysis":"深度分析","investment_weekly":"投资周报"};
var STYLE_CLS={"news_brief":"style-news","deep_analysis":"style-deep","investment_weekly":"style-invest"};
var FREQ_NAMES={"daily":"每日","weekly":"每周","monthly":"每月"};
var SOURCE_NAMES={"cailianshe":"财联社","nbd":"每经网","36kr":"36氪","weibo":"微博"};
function api(u,o){o=o||{};o.headers={"Content-Type":"application/json"};return fetch(u,o).then(function(r){return r.json()})}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function toast(m,t){var e=document.getElementById("toast");e.textContent=m;e.className="toast toast-"+(t||"info")+" show";setTimeout(function(){e.classList.remove("show")},3000)}
function closeAll(){document.querySelectorAll(".modal-overlay").forEach(function(m){m.classList.remove("show")})}
function loadSubjects(id){
  api("/api/meta").then(function(d){
    var s=document.getElementById(id);s.innerHTML="";
    (d.subjects||[]).forEach(function(v){var o=document.createElement("option");o.value=v;o.textContent=v;s.appendChild(o)})
  })
}

// ========== 采集任务 ==========
function loadCollect(){
  api("/api/tasks").then(function(tasks){
    if(!tasks||!tasks.length){document.getElementById("collectTable").innerHTML='<div class="empty">暂无采集任务</div>';return}
    var h='<table><tr><th>主题</th><th>来源</th><th>调度</th><th>最大数</th><th>状态</th><th>操作</th></tr>';
    tasks.forEach(function(t){
      var src="";(t.sources||[]).forEach(function(s){src+='<span class="source-tag">'+(SOURCE_NAMES[s]||s)+'</span>'});
      h+='<tr><td><strong>'+esc(t.subject)+'</strong></td><td>'+src+'</td><td>'+esc(t.cron_expr)+'</td><td>'+t.max_results+'</td>';
      h+='<td>'+(t.enabled?'<span class="status-on">● 运行中</span>':'<span class="status-off">● 停止</span>')+'</td>';
      h+='<td><div class="actions">';
      h+='<button class="btn btn-sm btn-ghost" onclick="editCollect(\''+esc(t.id)+'\')">编辑</button>';
      h+='<button class="btn btn-sm btn-success" onclick="runCollect(\''+esc(t.id)+'\')">执行</button>';
      h+='<button class="btn btn-sm btn-danger" onclick="delCollect(\''+esc(t.id)+'\')">删除</button>';
      h+='</div></td></tr>'
    });
    document.getElementById("collectTable").innerHTML=h+'</table>'
  })
}
function openCollectModal(task){
  document.getElementById("cEditId").value=task?task.id:"";
  document.getElementById("cModalTitle").textContent=task?"编辑采集任务":"新建采集任务";
  document.getElementById("cSubject").value=task?task.subject:"";
  document.getElementById("cCron").value=task?task.cron_expr:"0 */2 * * *";
  document.getElementById("cMax").value=task?task.max_results:20;
  var checks=document.querySelectorAll("#cSources input");
  var taskSrc=task?task.sources:ALL_SOURCES;
  checks.forEach(function(c){c.checked=taskSrc.indexOf(c.value)>-1});
  document.getElementById("collectModal").classList.add("show")
}
function editCollect(id){
  api("/api/tasks").then(function(tasks){
    for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){openCollectModal(tasks[i]);return}}
  })
}
function saveCollect(){
  var s=document.getElementById("cSubject").value.trim();if(!s){toast("请输入主题","error");return}
  var src=[];document.querySelectorAll("#cSources input:checked").forEach(function(c){src.push(c.value)});
  if(!src.length){toast("请至少选择一个数据来源","error");return}
  var body={subject:s,sources:src,cron_expr:document.getElementById("cCron").value,max_results:parseInt(document.getElementById("cMax").value)||20};
  var editId=document.getElementById("cEditId").value;
  if(editId){
    api("/api/tasks/"+editId,{method:"DELETE"}).then(function(){
      return api("/api/tasks",{method:"POST",body:JSON.stringify(body)})
    }).then(function(){closeAll();toast("采集任务已更新，调度变更将在第二天生效","success");loadCollect()})
  }else{
    api("/api/tasks",{method:"POST",body:JSON.stringify(body)}).then(function(){closeAll();toast("采集任务已创建","success");loadCollect()})
  }
}
function runCollect(id){toast("执行中...","info");api("/api/tasks/"+id+"/run",{method:"POST"}).then(function(r){toast("完成，采集"+(r.total_count||0)+"条","success")})}
function delCollect(id){if(!confirm("确定删除？"))return;api("/api/tasks/"+id,{method:"DELETE"}).then(function(){toast("已删除","success");loadCollect()})}

// ========== 创作任务 ==========
function loadCreation(){
  api("/api/content/tasks").then(function(tasks){
    var ct=tasks.filter(function(t){return t.type==="creation"});
    if(!ct.length){document.getElementById("creationTable").innerHTML='<div class="empty">暂无创作任务</div>';return}
    var h='<table><tr><th>主题</th><th>风格</th><th>频率</th><th>创建时间</th><th>操作</th></tr>';
    ct.forEach(function(t){
      h+='<tr><td><strong>'+esc(t.subject)+'</strong></td>';
      h+='<td><span class="style-tag '+(STYLE_CLS[t.style]||"")+'">'+(STYLE_NAMES[t.style]||t.style)+'</span></td>';
      h+='<td><span class="freq-tag">'+(FREQ_NAMES[t.freq]||t.freq)+'</span></td>';
      h+='<td>'+esc((t.created_at||"").slice(0,16))+'</td>';
      h+='<td><div class="actions">';
      h+='<button class="btn btn-sm btn-ghost" onclick="editCreation(\''+esc(t.id)+'\')">编辑</button>';
      h+='<button class="btn btn-sm btn-success" onclick="runCreation(\''+esc(t.id)+'\')">立即生成</button>';
      h+='<button class="btn btn-sm btn-danger" onclick="delContent(\''+esc(t.id)+'\')">删除</button>';
      h+='</div></td></tr>'
    });
    document.getElementById("creationTable").innerHTML=h+'</table>'
  })
}
function openCreationModal(task){
  loadSubjects("crSubject");
  document.getElementById("crEditId").value=task?task.id:"";
  document.getElementById("crModalTitle").textContent=task?"编辑创作任务":"新建创作任务";
  if(task){
    setTimeout(function(){document.getElementById("crSubject").value=task.subject},300);
    document.getElementById("crStyle").value=task.style||"news_brief";
    document.getElementById("crFreq").value=task.freq||"daily";
  }else{
    document.getElementById("crStyle").value="news_brief";
    document.getElementById("crFreq").value="daily";
  }
  document.getElementById("creationModal").classList.add("show")
}
function editCreation(id){
  api("/api/content/tasks").then(function(tasks){
    for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){openCreationModal(tasks[i]);return}}
  })
}
function saveCreation(){
  var s=document.getElementById("crSubject").value;if(!s){toast("请选择主题","error");return}
  var body={type:"creation",subject:s,style:document.getElementById("crStyle").value,freq:document.getElementById("crFreq").value};
  var editId=document.getElementById("crEditId").value;
  if(editId){
    api("/api/content/tasks/"+editId,{method:"DELETE"}).then(function(){
      return api("/api/content/tasks",{method:"POST",body:JSON.stringify(body)})
    }).then(function(){closeAll();toast("创作任务已更新，将在下一个周期生效","success");loadCreation()})
  }else{
    api("/api/content/tasks",{method:"POST",body:JSON.stringify(body)}).then(function(){closeAll();toast("创作任务已创建","success");loadCreation()})
  }
}
function runCreation(id){toast("生成中...","info");api("/api/content/tasks/"+id+"/run",{method:"POST"}).then(function(r){
  if(r.error)toast(r.error,"error");else toast("已生成: "+r.title+" ("+r.news_count+"条资讯)","success")
})}

// ========== 发布任务 ==========
function loadPublish(){
  api("/api/content/tasks").then(function(tasks){
    var pt=tasks.filter(function(t){return t.type==="publish"});
    if(!pt.length){document.getElementById("publishTable").innerHTML='<div class="empty">暂无发布任务</div>';return}
    var h='<table><tr><th>主题</th><th>渠道</th><th>频率</th><th>创建时间</th><th>操作</th></tr>';
    pt.forEach(function(t){
      h+='<tr><td><strong>'+esc(t.subject)+'</strong></td><td>'+esc(t.channel||"小红书")+'</td>';
      h+='<td><span class="freq-tag">'+(FREQ_NAMES[t.freq]||t.freq)+'</span></td>';
      h+='<td>'+esc((t.created_at||"").slice(0,16))+'</td>';
      h+='<td><div class="actions">';
      h+='<button class="btn btn-sm btn-ghost" onclick="editPublish(\''+esc(t.id)+'\')">编辑</button>';
      h+='<button class="btn btn-sm btn-orange" onclick="runPublish(\''+esc(t.id)+'\')">立即发布</button>';
      h+='<button class="btn btn-sm btn-danger" onclick="delContent(\''+esc(t.id)+'\')">删除</button>';
      h+='</div></td></tr>'
    });
    document.getElementById("publishTable").innerHTML=h+'</table>'
  })
}
function openPublishModal(task){
  loadSubjects("pubSubject");
  document.getElementById("pubEditId").value=task?task.id:"";
  document.getElementById("pubModalTitle").textContent=task?"编辑发布任务":"新建发布任务";
  if(task){
    setTimeout(function(){document.getElementById("pubSubject").value=task.subject},300);
    document.getElementById("pubChannel").value=task.channel||"xiaohongshu";
    document.getElementById("pubFreq").value=task.freq||"daily";
  }else{
    document.getElementById("pubChannel").value="xiaohongshu";
    document.getElementById("pubFreq").value="daily";
  }
  document.getElementById("publishModal").classList.add("show")
}
function editPublish(id){
  api("/api/content/tasks").then(function(tasks){
    for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){openPublishModal(tasks[i]);return}}
  })
}
function savePublish(){
  var s=document.getElementById("pubSubject").value;if(!s){toast("请选择主题","error");return}
  var body={type:"publish",subject:s,channel:document.getElementById("pubChannel").value,freq:document.getElementById("pubFreq").value};
  var editId=document.getElementById("pubEditId").value;
  if(editId){
    api("/api/content/tasks/"+editId,{method:"DELETE"}).then(function(){
      return api("/api/content/tasks",{method:"POST",body:JSON.stringify(body)})
    }).then(function(){closeAll();toast("发布任务已更新，将在下一个周期生效","success");loadPublish()})
  }else{
    api("/api/content/tasks",{method:"POST",body:JSON.stringify(body)}).then(function(){closeAll();toast("发布任务已创建","success");loadPublish()})
  }
}
function runPublish(id){toast("准备发布...","info");api("/api/content/tasks/"+id+"/run",{method:"POST"}).then(function(r){
  if(r.error)toast(r.error,"error");else toast("状态: "+r.status,"success")
})}

function delContent(id){if(!confirm("确定删除？"))return;api("/api/content/tasks/"+id,{method:"DELETE"}).then(function(){toast("已删除","success");loadCreation();loadPublish()})}

loadCollect();loadCreation();loadPublish()
</script>
</body>
</html>
