<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 - D8Q 智能资讯工厂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;box-shadow:0 4px 24px rgba(0,0,0,.1);width:380px}
.login-box h1{text-align:center;font-size:24px;color:#1a1a2e;margin-bottom:8px}
.login-box p{text-align:center;color:#888;font-size:14px;margin-bottom:32px}
.field{margin-bottom:20px}
.field label{display:block;font-size:14px;font-weight:500;color:#555;margin-bottom:6px}
.field input{width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:8px;font-size:15px;outline:none;transition:border .2s}
.field input:focus{border-color:#1890ff}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{color:#ff4d4f;font-size:13px;text-align:center;margin-top:16px;min-height:20px}
</style>
</head>
<body>
<div class="login-box">
  <h1>🏭 D8Q 智能资讯工厂</h1>
  <p>请登录以继续</p>
  <div class="field">
    <label>用户名</label>
    <input id="username" type="text" placeholder="请输入用户名" autofocus>
  </div>
  <div class="field">
    <label>密码</label>
    <input id="password" type="password" placeholder="请输入密码">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
  <div class="error" id="error"></div>
</div>
<script>
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin() });
async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('error');
  btn.disabled = true; err.textContent = '';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const d = await r.json();
    if (r.ok) { location.href = '/'; }
    else { err.textContent = d.error || '登录失败'; }
  } catch(e) { err.textContent = '网络错误'; }
  btn.disabled = false;
}
</script>
</body>
</html>
