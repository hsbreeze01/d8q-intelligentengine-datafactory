<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>D8Q 智能资讯平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;background:#f0f2f5;color:#333;display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:#001529;color:rgba(255,255,255,.65);display:flex;flex-direction:column;flex-shrink:0}
.sidebar .logo{padding:16px 20px;font-size:18px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .logo span{font-size:11px;opacity:.5;font-weight:400;margin-left:4px}
.sidebar nav{flex:1;padding:8px 0}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:rgba(255,255,255,.65);text-decoration:none;font-size:14px;border-left:3px solid transparent;transition:all .15s}
.sidebar nav a:hover{color:#fff;background:rgba(255,255,255,.05)}
.sidebar nav a.active{color:#fff;background:rgba(24,144,255,.15);border-left-color:#1890ff}
.sidebar .divider{height:1px;background:rgba(255,255,255,.08);margin:8px 16px}
.sidebar .user-box{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:12px}
.sidebar .user-box .name{color:#fff;font-size:13px;font-weight:500}
.sidebar .user-box .role{color:rgba(255,255,255,.45);margin-top:2px}
.sidebar .user-box .logout{color:#ff6b6b;cursor:pointer;margin-top:4px;font-size:11px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar .title{font-size:16px;font-weight:600}
.topbar .search{padding:6px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;width:220px;outline:none}
.topbar .search:focus{border-color:#1890ff}
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.mc{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mc .label{font-size:13px;color:#999;margin-bottom:8px}
.mc .value{font-size:28px;font-weight:700;color:#1890ff}
.mc .sub{font-size:12px;margin-top:4px}.mc .sub.up{color:#52c41a}.mc .sub.warn{color:#faad14}
.card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.card h3{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card h3 .more{font-size:12px;color:#1890ff;font-weight:400;cursor:pointer;text-decoration:none}
.grid-2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.ni{padding:12px 0;border-bottom:1px solid #f5f5f5}.ni:last-child{border-bottom:none}
.ni .t{font-size:14px;font-weight:500;margin-bottom:4px}
.ni .m{font-size:12px;color:#999}
.ni .s{font-size:13px;color:#666;margin-top:4px;line-height:1.6}
.ni .acts{margin-top:6px;display:flex;gap:12px}.ni .acts a{font-size:12px;color:#1890ff;cursor:pointer;text-decoration:none}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;margin-right:4px}
.tag-policy{background:#fff7e6;color:#fa8c16}.tag-tech{background:#e6f7ff;color:#1890ff}
.tag-funding{background:#f6ffed;color:#52c41a}.tag-market{background:#f9f0ff;color:#722ed1}.tag-report{background:#f0f0f0;color:#666}
.et{width:100%;border-collapse:collapse;font-size:13px}
.et th{text-align:left;padding:10px 12px;background:#fafafa;color:#666;font-weight:500;border-bottom:1px solid #f0f0f0}
.et td{padding:10px 12px;border-bottom:1px solid #f5f5f5}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-ok{background:#f6ffed;color:#52c41a}.badge-info{background:#e6f7ff;color:#1890ff}.badge-err{background:#fff2f0;color:#ff4d4f}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fb{padding:6px 14px;border:1px solid #d9d9d9;border-radius:16px;font-size:12px;cursor:pointer;background:#fff;transition:all .15s}
.fb:hover{border-color:#1890ff;color:#1890ff}.fb.active{background:#1890ff;color:#fff;border-color:#1890ff}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.tc{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .2s;border-left:4px solid #1890ff}
.tc:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.tc .n{font-size:16px;font-weight:600;margin-bottom:12px}
.tc .sc{font-size:24px;font-weight:700;color:#1890ff}
.tc .ch{font-size:13px;margin-left:8px}.tc .ch.up{color:#52c41a}.tc .ch.dn{color:#ff4d4f}
.tc .st{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;font-size:12px;color:#666}
.tc .st b{color:#333;font-weight:500;float:right}
.btn{padding:10px 20px;background:#1890ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px}
.btn:hover{background:#40a9ff}.btn-ghost{background:transparent;color:#1890ff;border:1px solid #1890ff}.btn-ghost:hover{background:#e6f7ff}
.btn-lg{padding:12px 32px;font-size:15px}
.tpl-opts{display:flex;gap:12px;margin-bottom:16px}
.tpl-opt{padding:10px 20px;border:2px solid #e8e8e8;border-radius:8px;cursor:pointer;font-size:13px}
.tpl-opt.active{border-color:#1890ff;background:#e6f7ff;color:#1890ff}
.rcfg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.rcfg .f label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.rcfg .f select{width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none}
.edt-bar{display:flex;gap:4px;padding:8px 12px;background:#fafafa;border:1px solid #e8e8e8;border-radius:6px 6px 0 0}
.edt-bar button{padding:4px 8px;border:none;background:none;cursor:pointer;border-radius:4px;font-size:13px}
.edt-bar button:hover{background:#e8e8e8}
.edt-body{border:1px solid #e8e8e8;border-top:none;border-radius:0 0 6px 6px;padding:20px;min-height:300px;font-size:14px;line-height:1.8;outline:none}
.empty{text-align:center;padding:40px;color:#999;font-size:14px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:6px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.toast.show{opacity:1}.toast.err{background:#fff2f0;color:#ff4d4f;border-color:#ffccc7}
@media(max-width:768px){.sidebar{width:56px}.sidebar .logo span,.sidebar nav a span,.sidebar .user-box{display:none}.sidebar nav a{justify-content:center;padding:12px}}

/* === 资讯 Feed 样式 === */
.feed-item{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .2s;border-left:4px solid #d9d9d9}
.feed-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.feed-item.policy{border-left-color:#fa8c16}.feed-item.tech{border-left-color:#1890ff}
.feed-item.funding{border-left-color:#52c41a}.feed-item.market{border-left-color:#722ed1}.feed-item.report{border-left-color:#666}
.feed-title{font-size:15px;font-weight:500;margin-bottom:8px;line-height:1.5}
.feed-title a{color:#333;text-decoration:none}.feed-title a:hover{color:#1890ff}
.feed-meta{font-size:12px;color:#999;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.feed-summary{font-size:13px;color:#666;line-height:1.7;margin-top:6px;padding:8px 12px;background:#f8f9fa;border-radius:6px}
.feed-actions{margin-top:8px;display:flex;gap:12px}
.feed-actions a{font-size:12px;color:#1890ff;cursor:pointer;text-decoration:none}
.feed-actions a:hover{text-decoration:underline}
.feed-pager{display:flex;justify-content:center;gap:6px;margin-top:16px}
.feed-pager .fp{min-width:32px;height:32px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;cursor:pointer;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .15s}
.feed-pager .fp:hover{border-color:#1890ff;color:#1890ff}.feed-pager .fp.active{background:#1890ff;color:#fff;border-color:#1890ff}

/* === 个股页样式 === */
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stock-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:all .2s;position:relative;border:1px solid #f0f0f0}
.stock-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px);border-color:#1890ff}
.stock-card .sc-name{font-size:15px;font-weight:600;margin-bottom:4px}
.stock-card .sc-code{font-size:12px;color:#999}
.stock-card .sc-del{position:absolute;top:8px;right:10px;color:#ccc;cursor:pointer;font-size:16px;transition:color .15s}
.stock-card .sc-del:hover{color:#ff4d4f}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;font-size:24px;font-weight:700;margin-right:20px}
.risk-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:16px;font-size:13px;font-weight:500}
.risk-badge.low{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.risk-badge.mid{background:#fffbe6;color:#faad14;border:1px solid #ffe58f}
.risk-badge.high{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
.term-card{border:1px solid #f0f0f0;border-radius:10px;padding:16px;transition:all .2s}
.term-card:hover{border-color:#1890ff}
.term-card .term-label{font-size:13px;color:#999;margin-bottom:4px}
.term-card .term-signal{font-size:16px;font-weight:600;margin-bottom:8px}
.term-card .term-outlook{font-size:13px;color:#555;line-height:1.6;margin-bottom:8px}
.term-card ul{margin:0;padding-left:16px;font-size:12px;color:#666}
.alert-box{background:#fff2f0;border:1px solid #ffccc7;border-radius:8px;padding:12px 16px;margin-bottom:16px}
.alert-box .alert-title{font-size:13px;font-weight:500;color:#ff4d4f;margin-bottom:6px}

/* === 研报页样式 === */
.rpt-item{background:#fff;border-radius:10px;padding:16px 20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .2s}
.rpt-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.rpt-title{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.5}
.rpt-meta{font-size:12px;color:#999;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rpt-meta .org-tag{background:#e6f7ff;color:#1890ff;padding:2px 8px;border-radius:10px;font-size:11px}
.ai-box{background:linear-gradient(135deg,#e6f7ff,#f0f5ff);border:1px solid #91d5ff;border-radius:10px;padding:16px;margin-bottom:16px}
.ai-box .ai-label{font-size:12px;color:#1890ff;font-weight:500;margin-bottom:8px}
.ai-box .ai-text{font-size:14px;line-height:1.8;color:#333}

.view-toggle{display:inline-flex;border:1px solid #d9d9d9;border-radius:6px;overflow:hidden;margin-right:16px;font-size:12px}
.view-toggle span{padding:4px 12px;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.view-toggle span.active{background:#1890ff;color:#fff}
.view-toggle span:hover:not(.active){background:#f5f5f5}
.guide-banner{background:linear-gradient(135deg,#e6f7ff 0%,#bae7ff 100%);border:1px solid #91d5ff;border-radius:8px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:14px;color:#1890ff;animation:slideDown .3s ease}
.guide-banner a{color:#0050b3;font-weight:600;text-decoration:underline;cursor:pointer}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">🏭 D8Q<span>Pro</span></div>
<nav id="nav"></nav>
<div class="user-box"><div class="name" id="uName">-</div><div class="role" id="uRole">-</div><div class="logout" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')">退出登录</div></div>
</div>
<div class="main">
<div class="topbar"><div class="title" id="pageTitle">概览</div><div id="viewToggle" style="display:none" class="view-toggle"><span class="active" data-v="mine" onclick="switchView('mine')">我的视图</span><span data-v="all" onclick="switchView('all')">全局视图</span></div><input class="search" placeholder="搜索资讯、赛道..." id="globalSearch"></div>
<div class="content" id="contentArea"></div>
</div>
<div class="toast" id="toast"></div>
<div id="taskModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:1000;justify-content:center;align-items:center"></div>
</body>
</html>
<script>
// === 导航与路由 ===
const PAGES=[
{id:'dashboard',icon:'📊',label:'概览',title:'概览'},
{id:'track',icon:'🔥',label:'赛道',title:'赛道热度'},
{id:'feed',icon:'📰',label:'资讯',title:'资讯'},
{id:'weekly',icon:'📝',label:'周报',title:'周报工作台'},
{id:'stock',icon:'📈',label:'个股',title:'个股分析'},
{id:'report',icon:'📑',label:'研报',title:'研报分析'},
{id:'policy',icon:'📜',label:'政策',title:'政策分析'},
{id:'follows',icon:'⭐',label:'我的关注',title:'我的关注'},
{id:'_div'},
{id:'tasks',icon:'⚙️',label:'任务',title:'任务管理',role:'editor'},
{id:'monitor',icon:'📡',label:'运行监控',title:'运行监控',role:'admin'},
{id:'_div'},
{id:'settings',icon:'🔧',label:'设置',title:'系统设置',role:'admin'},
];
let curPage=(location.pathname.replace('/',''))||'dashboard',userRole='viewer';

function initNav(){
const nav=document.getElementById('nav');
nav.innerHTML=PAGES.map(p=>{
if(p.id==='_div')return'<div class="divider"></div>';
if(p.role==='admin'&&userRole!=='admin')return'';
if(p.role==='editor'&&userRole==='viewer')return'';
return`<a href="#" data-p="${p.id}" class="${p.id===curPage?'active':''}">${p.icon} <span>${p.label}</span></a>`;
}).join('');
nav.querySelectorAll('a').forEach(a=>a.onclick=e=>{e.preventDefault();goPage(a.dataset.p)});
}

function goPage(id,push=true){
curPage=id;
document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.p===id));
const p=PAGES.find(x=>x.id===id);
document.getElementById('pageTitle').textContent=p?p.title:id;
if(push&&id!==(location.pathname.replace('/','')||'dashboard'))history.pushState({page:id},'', '/'+(id==='dashboard'?'':id));
loadPage(id);
}
window.addEventListener('popstate',e=>{if(e.state&&e.state.page)goPage(e.state.page,false)});


function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2500)}
function api(url,opt){return fetch(url,{headers:{'Content-Type':'application/json'},...opt}).then(r=>r.json())}
function apiV(url,opt){if(window.viewAll&&url.includes('/api/')){const sep=url.includes('?')?'&':'?';return api(url+sep+'view=all',opt)}return api(url,opt)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function tagHtml(type){const m={policy:'政策',funding:'融资',tech:'技术',market:'市场',report:'研报'};return`<span class="tag tag-${type||'tech'}">${m[type]||type||''}</span>`}

// === 页面加载 ===
function loadPage(id){
const area=document.getElementById('contentArea');
const loaders={dashboard:loadDashboard,track:loadTrack,feed:loadFeed,weekly:loadWeekly,stock:loadStock,report:loadReport,tasks:loadTasks,monitor:loadMonitor,settings:loadSettings,policy:loadPolicy,follows:loadFollows};
if(loaders[id])loaders[id](area);
else area.innerHTML='<div class="empty">页面开发中...</div>';
}

// === Dashboard ===
async function loadDashboard(el){
if(window._showGuide){const gb=document.createElement('div');gb.className='guide-banner';gb.innerHTML='👋 欢迎使用 D8Q！请先选择您关注的赛道，我们将为您个性化推荐内容。<a onclick="goPage(\'follows\')">去关注 →</a>';el.parentElement.insertBefore(gb,el);}
const[heat,news]=await Promise.all([
apiV('/api/proxy/tracks/heat/latest'),
apiV('/api/news?size=5')
]);
const heatData=heat||[];
const newsItems=news.items||[];
const totalNews=news.total||0;
const trackCount=heatData.length;
const alerts=heatData.filter(h=>h.change&&h.change>15).length;

el.innerHTML=`
<div class="metrics">
<div class="mc"><div class="label">今日资讯</div><div class="value">${totalNews}</div><div class="sub up">数据库总量</div></div>
<div class="mc"><div class="label">关注赛道</div><div class="value">${trackCount}</div><div class="sub">活跃追踪中</div></div>
<div class="mc"><div class="label">热度异动</div><div class="value">${alerts}</div><div class="sub warn">${alerts?'有赛道热度突增':'暂无异动'}</div></div>

</div>
<div class="grid-2">
<div class="card"><h3>赛道热度趋势 (7日) <a class="more" onclick="goPage('track')">查看全部 →</a></h3><div id="dashChart" style="height:220px"></div></div>
<div class="card"><h3>今日要闻 <a class="more" onclick="goPage('feed')">更多 →</a></h3>${newsItems.slice(0,5).map(n=>`<div class="ni"><div class="t">${n.url?`<a href="${n.url}" target="_blank" style="color:#333;text-decoration:none">${esc(n.title)}</a>`:esc(n.title)}</div><div class="m">${(n.publish_time||'').slice(5,16)} · ${n.source}</div></div>`).join('')}</div>
</div>
`;
// 渲染图表
loadDashChart(heatData);
// 服务状态卡片 (admin only)

}

async function loadDashChart(latestHeat){
const data=await apiV('/api/proxy/tracks/heat?days=7');
if(!data||!data.length)return;
const tracks={};
data.forEach(d=>{if(!tracks[d.name])tracks[d.name]={color:d.color,dates:[],scores:[]};tracks[d.name].dates.push(d.date.slice(5));tracks[d.name].scores.push(d.score)});
const series=Object.entries(tracks).map(([name,v])=>({name,type:'line',smooth:true,data:v.scores,itemStyle:{color:v.color},lineStyle:{color:v.color}}));
const dates=Object.values(tracks)[0]?.dates||[];
const chart=echarts.init(document.getElementById('dashChart'));
chart.setOption({tooltip:{trigger:'axis'},legend:{top:0,right:0,textStyle:{fontSize:11}},grid:{top:30,bottom:20,left:40,right:20},xAxis:{type:'category',data:dates},yAxis:{type:'value',max:100},series});
}

// === 赛道页 ===
async function loadTrack(el){
const[tracks,latest]=await Promise.all([apiV('/api/proxy/tracks'),apiV('/api/proxy/tracks/heat/latest')]);
el.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<div class="filters"><span class="fb active" onclick="loadTrackChart(7)">7天</span><span class="fb" onclick="loadTrackChart(30)">30天</span><span class="fb" onclick="loadTrackChart(90)">90天</span></div>
</div>
<div class="card"><h3>热度趋势对比</h3><div id="trackChart" style="height:250px"></div></div>
<div class="tg">${(latest||[]).map(t=>`
<div class="tc" style="border-left-color:${t.color||'#1890ff'}" onclick="goPage('feed')">
<div class="n">${esc(t.name)}</div>
<span class="sc">${t.score!=null?t.score:'-'}</span>
<span class="ch ${(t.change||0)>=0?'up':'dn'}">${t.change!=null?(t.change>=0?'↑':'↓')+Math.abs(t.change).toFixed(1):''}</span>
<div class="st"><span>资讯 <b>${t.news_count||0}条</b></span><span>政策 <b>${t.policy_count||0}条</b></span><span>研报 <b>${t.report_count||0}次</b></span><span>融资 <b>${t.funding_count||0}笔</b></span></div>
</div>`).join('')}</div>`;
loadTrackChart(7);
}

async function loadTrackChart(days){
document.querySelectorAll('.filters .fb').forEach((b,i)=>b.classList.toggle('active',[7,30,90][i]===days));
const data=await apiV('/api/proxy/tracks/heat?days='+days);
if(!data||!data.length)return;
const tracks={};
data.forEach(d=>{if(!tracks[d.name])tracks[d.name]={color:d.color,dates:[],scores:[]};tracks[d.name].dates.push(d.date.slice(5));tracks[d.name].scores.push(d.score)});
const series=Object.entries(tracks).map(([name,v])=>({name,type:'line',smooth:true,data:v.scores,itemStyle:{color:v.color},lineStyle:{color:v.color},areaStyle:{color:v.color,opacity:0.05}}));
const dates=Object.values(tracks)[0]?.dates||[];

function showImportPanel(){document.getElementById('importPanel').style.display='block'}
function handleStockFile(input){
var file=input.files[0];if(!file)return;
document.getElementById('fileStatus').textContent=file.name+' ('+(file.size/1024).toFixed(1)+'KB)';
var reader=new FileReader();
reader.onload=function(e){
var text=e.target.result;
if(!text||!text.trim()){document.getElementById('filePreview').innerHTML='<div style="color:#ff4d4f;font-size:12px">\u6587\u4ef6\u5185\u5bb9\u4e3a\u7a7a\uff0c\u8bf7\u68c0\u67e5\u6587\u4ef6\u683c\u5f0f</div>';document.getElementById('filePreview').style.display='block';return}
var lines=text.split(/\\r?\\n/).map(function(l){return l.trim()}).filter(function(l){return l.length>0});
var truncated=false;if(lines.length>50){lines=lines.slice(0,50);truncated=true}
if(!lines.length){document.getElementById('filePreview').innerHTML='<div style="color:#ff4d4f;font-size:12px">\u6587\u4ef6\u5185\u5bb9\u4e3a\u7a7a</div>';document.getElementById('filePreview').style.display='block';return}
var html='<div style="font-size:12px;color:#333;margin-bottom:8px">'+(truncated?'<span style="color:#faad14">\u26a0 \u6587\u4ef6\u8d85\u8fc750\u884c\uff0c\u53ea\u4f7f\u7528\u524d50\u884c</span><br>':'')+'<b>\u8bc6\u522b\u5230 '+lines.length+' \u4e2a\u80a1\u7968\u540d\u79f0\uff1a</b></div>';
html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
lines.forEach(function(l){html+='<span style="background:#e6f7ff;color:#1890ff;padding:2px 8px;border-radius:4px;font-size:12px">'+esc(l)+'</span>'});
html+='</div>';
var kwArr=lines.map(function(l){return "'"+l.replace(/'/g,"\\\\'")+"'"});
html+='<button class="btn" style="padding:6px 20px;font-size:12px" onclick="batchSearchReport(['+kwArr.join(',')+'])">\u5f00\u59cb\u6279\u91cf\u641c\u7d22 ('+lines.length+'\u53ea)</button>';
document.getElementById('filePreview').innerHTML=html;document.getElementById('filePreview').style.display='block';
};
reader.onerror=function(){document.getElementById('filePreview').innerHTML='<div style="color:#ff4d4f;font-size:12px">\u6587\u4ef6\u8bfb\u53d6\u5931\u8d25\uff0c\u8bf7\u786e\u8ba4\u4e3a UTF-8 \u7f16\u7801\u7684 txt \u6587\u4ef6</div>';document.getElementById('filePreview').style.display='block'};
reader.readAsText(file,'UTF-8');
}
async function batchSearchReport(keywords){
var area=document.getElementById('reportResult');
area.innerHTML='<div class="empty">\ud83d\udd0d \u6279\u91cf\u641c\u7d22\u4e2d... (0/'+keywords.length+')</div>';
var batchSize=10;var allResults=[];var totalDone=0;
for(var i=0;i<keywords.length;i+=batchSize){
var batch=keywords.slice(i,i+batchSize);
try{var data=await api('/api/report/stock',{method:'POST',body:JSON.stringify({keywords:batch,days:30})});var results=data.results||[];allResults=allResults.concat(results)}catch(e){}
totalDone+=batch.length;area.innerHTML='<div class="empty">\ud83d\udd0d \u6279\u91cf\u641c\u7d22\u4e2d... ('+Math.min(totalDone,keywords.length)+'/'+keywords.length+')</div>';}
if(!allResults.length){area.innerHTML='<div class="empty">\u6240\u6709\u80a1\u7968\u5747\u672a\u627e\u5230\u7814\u62a5\uff0c\u8bf7\u68c0\u67e5\u80a1\u7968\u540d\u79f0\u662f\u5426\u6b63\u786e</div>';return}
var hitCount=allResults.filter(function(r){return r&&(r.reports&&r.reports.length||r.announcements&&r.announcements.length)}).length;
var missCount=keywords.length-hitCount;

async function addUser(){
const el=document.getElementById('userMgmt');
if(document.getElementById('addUserForm'))return;
const form=document.createElement('div');
form.id='addUserForm';
form.style.cssText='background:#f9fafb;border:1px solid #e8e8e8;border-radius:8px;padding:16px;margin-bottom:16px';
form.innerHTML=`<div style="font-weight:500;margin-bottom:12px">新增用户</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div><label style="font-size:12px;color:#666">用户名</label><input id="nu_name" class="search" style="width:100%;margin-top:4px;padding:8px 10px" placeholder="输入用户名"></div>
<div><label style="font-size:12px;color:#666">密码（≥8位）</label><input id="nu_pass" type="password" class="search" style="width:100%;margin-top:4px;padding:8px 10px" placeholder="输入密码"></div>
<div><label style="font-size:12px;color:#666">角色</label><select id="nu_role" class="search" style="width:100%;margin-top:4px;padding:8px 10px"><option value="viewer">viewer - 只读</option><option value="editor">editor - 可编辑</option><option value="admin">admin - 管理员</option></select></div>
</div>
<div style="margin-top:12px;display:flex;gap:8px">
<button class="btn" style="font-size:12px;padding:6px 16px" onclick="submitAddUser()">确认创建</button>
<button class="btn-ghost" style="font-size:12px;padding:6px 16px" onclick="document.getElementById('addUserForm').remove()">取消</button>
</div>`;
el.insertBefore(form,el.firstChild);
document.getElementById('nu_name').focus();

async function submitAddUser(){
const username=document.getElementById('nu_name').value.trim();
const password=document.getElementById('nu_pass').value;
const role=document.getElementById('nu_role').value;
if(!username){toast('请输入用户名');return}
if(password.length<8){toast('密码至少8位');return}
const r=await api('/api/auth/users',{method:'POST',body:JSON.stringify({username,password,role})});
if(r.error){toast(r.error)}else{toast('用户 '+username+' 创建成功');loadUserMgmt()}
}
async function freezeUser(name,frozen){
if(!confirm(frozen?'确认解冻？':'确认冻结该用户？'))return;
await api('/api/auth/users/'+name+'/freeze',{method:'POST'});
toast(frozen?'已解冻':'已冻结');loadUserMgmt();
}
async function delUser(name){
const modal=document.getElementById('taskModal');
modal.style.display='flex';
modal.innerHTML=`<div class="card" style="width:400px;max-width:90vw">
<h3 style="margin-bottom:20px;color:#ff4d4f">⚠️ 删除用户</h3>
<div style="text-align:center;margin-bottom:20px"><div style="width:56px;height:56px;border-radius:50%;background:#fff2f0;display:inline-flex;align-items:center;justify-content:center;font-size:24px">👤</div><div style="margin-top:8px;font-size:15px;font-weight:600">${esc(name)}</div></div>
<div style="background:#fff2f0;border:1px solid #ffccc7;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#ff4d4f;line-height:1.6">此操作将永久删除该用户及其所有个人数据（订阅、自选股、偏好设置等），且<strong>不可恢复</strong>。</div>
<div style="margin-bottom:16px"><label style="font-size:13px;color:#555;font-weight:500">请输入用户名 <b>${esc(name)}</b> 以确认</label><input id="del_confirm" class="search" style="width:100%;margin-top:6px;padding:10px 12px" placeholder="输入用户名确认删除" onkeydown="if(event.key==='Enter')submitDelUser('${name}')"></div>
<div style="display:flex;justify-content:flex-end;gap:10px;padding-top:16px;border-top:1px solid #f0f0f0"><button class="btn-ghost" onclick="closeModal()">取消</button><button class="btn" style="background:#ff4d4f" onclick="submitDelUser('${name}')">确认删除</button></div></div>`;
setTimeout(()=>document.getElementById('del_confirm')?.focus(),100);
}
async function submitDelUser(name){
const v=document.getElementById('del_confirm').value.trim();
if(v!==name){toast('输入的用户名不匹配',true);return}
const r=await api('/api/auth/users/'+name,{method:'DELETE'});
if(r.error){toast(r.error,true)}else{toast('用户 '+name+' 已删除');closeModal();loadUserMgmt()}
}
async function resetPw(name){
const modal=document.getElementById('taskModal');
modal.style.display='flex';
modal.innerHTML=`<div class="card" style="width:400px;max-width:90vw">
<h3 style="margin-bottom:20px">🔑 重置密码</h3>
<div style="text-align:center;margin-bottom:20px"><div style="width:56px;height:56px;border-radius:50%;background:#e6f7ff;display:inline-flex;align-items:center;justify-content:center;font-size:24px">👤</div><div style="margin-top:8px;font-size:15px;font-weight:600">${esc(name)}</div><div style="font-size:12px;color:#999">设置新密码</div></div>
<div style="margin-bottom:16px"><label style="font-size:13px;color:#555;font-weight:500">新密码</label><input id="rp_pass" type="password" class="search" style="width:100%;margin-top:6px;padding:10px 12px" placeholder="至少 8 位字符" onkeydown="if(event.key==='Enter')submitResetPw('${name}')"></div>
<div style="margin-bottom:16px"><label style="font-size:13px;color:#555;font-weight:500">确认密码</label><input id="rp_pass2" type="password" class="search" style="width:100%;margin-top:6px;padding:10px 12px" placeholder="再次输入新密码" onkeydown="if(event.key==='Enter')submitResetPw('${name}')"></div>
<div style="display:flex;justify-content:flex-end;gap:10px;padding-top:16px;border-top:1px solid #f0f0f0"><button class="btn-ghost" onclick="closeModal()">取消</button><button class="btn" onclick="submitResetPw('${name}')">确认重置</button></div></div>`;
setTimeout(()=>document.getElementById('rp_pass')?.focus(),100);

async function submitResetPw(name){
const pw=document.getElementById('rp_pass').value;
const pw2=document.getElementById('rp_pass2').value;
if(pw.length<8){toast('密码至少 8 位',true);return}
if(pw!==pw2){toast('两次输入的密码不一致',true);return}
const r=await api('/api/auth/users/'+name+'/password',{method:'PUT',body:JSON.stringify({password:pw})});
if(r&&r.error){toast(r.error,true)}else{toast('密码重置成功');closeModal()}
}
async function changeRole(name,currentRole){
const modal=document.getElementById('taskModal');
modal.style.display='flex';
modal.innerHTML=`<div class="card" style="width:400px;max-width:90vw">
<h3 style="margin-bottom:20px">🔄 修改角色</h3>

<div style="margin-bottom:16px"><label style="font-size:13px;color:#555;font-weight:500">新角色</label><select id="cr_role" class="search" style="width:100%;margin-top:6px;padding:10px 12px"><option value="viewer" ${currentRole==='viewer'?'selected':''}>viewer - 只读</option><option value="editor" ${currentRole==='editor'?'selected':''}>editor - 可编辑</option><option value="admin" ${currentRole==='admin'?'selected':''}>admin - 管理员</option></select></div>
<div style="background:#fff7e6;border:1px solid #ffe58f;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#d48806;line-height:1.6">角色变更将立即生效，该用户下次操作时自动获得新权限，无需重新登录。</div>
<div style="display:flex;justify-content:flex-end;gap:10px;padding-top:16px;border-top:1px solid #f0f0f0"><button class="btn-ghost" onclick="closeModal()">取消</button><button class="btn" onclick="submitChangeRole('${name}','${currentRole}')">确认修改</button></div></div>`;

async function submitChangeRole(name,oldRole){
const newRole=document.getElementById('cr_role').value;
if(newRole===oldRole){toast('角色未变更');closeModal();return}
const r=await api('/api/auth/users/'+name+'/role',{method:'PUT',body:JSON.stringify({role:newRole})});
if(r&&r.error){toast(r.error,true)}else{toast(name+' 角色已改为 '+newRole);closeModal();loadUserMgmt()}
}

async function loadMonitor(el){

const svcs=data.services||{};
const rules=data.rules||[];
const alerts=data.alert_count||0;
const ts=data.timestamp||'';

const svcNames={agent:"数据采集 Agent",stockshark:"股票分析 Shark",compass:"金融计算 Compass",factory:"聚合生产 Factory",infopublisher:"资讯发布 Publisher",xvfb:"虚拟显示 Xvfb",ghost_browser:"浏览器池 Ghost"};

el.innerHTML=`
<style>
.m-alert{padding:12px 20px;border-radius:8px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500}
.m-alert.ok{background:#f6ffed;border:1px solid #b7eb8f;color:#52c41a}
.m-alert.err{background:#fff2f0;border:1px solid #ffccc7;color:#ff4d4f}
.m-svc{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5}

</style>
<div class="m-alert ${alerts?'err':'ok'}">${alerts?'\u26a0\ufe0f '+alerts+' \u9879\u5f02\u5e38':'\u2705 \u7cfb\u7edf\u8fd0\u884c\u6b63\u5e38'} <span style="margin-left:auto;font-size:12px;font-weight:400;color:#999">\u4e0a\u6b21\u66f4\u65b0: ${ts}</span>
<button class="btn-ghost" style="padding:4px 12px;font-size:12px;margin-left:12px" onclick="loadMonitor(document.getElementById('contentArea'))">\u{1f504} \u5237\u65b0</button></div>
<div class="grid-2">
<div class="card"><h3>\u{1f3e0} \u57fa\u7840\u8bbe\u65bd <span style="font-size:11px;color:#999;font-weight:400">${Object.keys(svcs).length} \u4e2a\u670d\u52a1</span></h3>
${Object.entries(svcs).map(([k,s])=>{
const ok=s.status==='ok'||s.status==='active';
const ms=s.elapsed_ms?' '+s.elapsed_ms+'ms':'';
const port=s.port?':'+s.port:'';
return '<div class="m-svc"><span class="m-svc-name"><span class="badge '+(ok?'badge-ok':'badge-err')+'">'+(ok?'\u25cf \u6b63\u5e38':'\u25cf \u5f02\u5e38')+'</span> '+(svcNames[k]||k)+'<span style="color:#999;font-size:11px">'+port+ms+'</span></span></div>';
}).join('')}
</div>
<div class="card"><h3>\u{1f4ca} \u4e1a\u52a1\u76d1\u63a7 <span style="font-size:11px;color:#999;font-weight:400">${rules.length} \u6761\u89c4\u5219</span> <button class="btn" style="float:right;font-size:11px;padding:4px 12px" onclick="addMonitorRule()">+ \u65b0\u589e\u89c4\u5219</button></h3>
${rules.map(r=>{
const ok=r.status==='ok';

const rd=r.raw_data||{};const st=(rd._status||{});const hasExpiry=rd.valid!==undefined;
let extra='';
if(hasExpiry){const ef=st.expired_fields||[];const wf=st.warn_fields||[];
if(!ok){extra='<span style="margin-left:8px;font-size:11px;color:#ff4d4f">已过期</span>';}
else if(ef.length){extra='<span style="margin-left:8px;font-size:11px;color:#ff4d4f">部分过期: '+ef.length+'项</span>';}
else if(wf.length){extra='<span style="margin-left:8px;font-size:11px;color:#faad14">即将过期: '+wf.length+'项</span>';}
else{extra='<span style="margin-left:8px;font-size:11px;color:#52c41a">✅ 有效</span>';}}
return '<div class="m-rule"><div style="flex:1"><div style="font-weight:500;font-size:13px">'+(ok?'\u2705':'\u274c')+' '+esc(r.name)+'</div><div style="font-size:12px;color:#999;margin-top:2px">'+esc(r.message||'')+' <span style="color:#bbb">\u00b7 '+r.type+' \u00b7 '+(r.checked_at||'').slice(11,19)+'</span></div></div><div>'+(ok?'':'<span style="font-size:11px;color:#ff4d4f">'+sev+' '+r.severity+'</span>')+(r.name.indexOf('Cookie')>=0?'<button class="'+(ok?'btn-ghost':'btn')+'" style="margin-left:12px;padding:4px 12px;font-size:11px" onclick="updateCookie()">\u66f4\u65b0 Cookie</button>':'')+'</div></div>';
}).join('')}
</div>
</div>`;
}

async function submitCode(){
const code=document.getElementById('codeInput').value.trim();
if(!code||code.length<4){toast('请输入正确的验证码',true);return}
const btn=event.target;btn.disabled=true;btn.textContent='登录中...';
try{
const r=await api('/api/cookie/capture-submit-code',{method:'POST',body:JSON.stringify({code:code})});
if(r.error){toast(r.error,true);btn.disabled=false;btn.textContent='登录';return}
document.getElementById('cs3').style.background='#52c41a';document.getElementById('cs3').textContent='✓';
document.getElementById('cs3t').textContent='验证码已提交，等待登录完成...';
document.getElementById('phoneFallback').innerHTML='<div style="text-align:center;color:#999;padding:10px">正在验证登录状态...</div>';
if(_cookiePoll){clearInterval(_cookiePoll);_cookiePoll=null}
_cookiePoll=setInterval(async()=>{const poll=_cookiePoll;
var s;try{s=await api('/api/cookie/capture-status')}catch(e){return}
if(s.status==='completed'){
clearInterval(poll);
document.getElementById('cs3').textContent='✓';
document.getElementById('cs3t').textContent='Cookie 更新成功！共捕获 '+s.cookie_count+' 个 Cookie';
document.getElementById('phoneFallback').innerHTML='<div style="color:#52c41a;font-size:48px;text-align:center">✓</div>';
document.getElementById('cookieFooter').innerHTML='<button class="btn" onclick="closeModal();loadMonitor(document.getElementById(\'contentArea\'))">完成</button>';
}else if(s.status==='timeout'||s.status==='failed'){
clearInterval(poll);
document.getElementById('cs3').style.background='#ff4d4f';document.getElementById('cs3').textContent='✗';
document.getElementById('cs3t').textContent=s.message||'操作失败';
document.getElementById('phoneFallback').innerHTML='';
document.getElementById('cookieFooter').innerHTML='<button class="btn" onclick="updateCookie()">重试</button><button class="btn-ghost" onclick="closeModal()">关闭</button>';
}
},2000);
}catch(e){
toast('登录失败: '+e.message,true);btn.disabled=false;btn.textContent='登录';
}
}

async function submitAddMonitorRule(){
const name=document.getElementById('mr_name').value.trim();
const type=document.getElementById('mr_type').value;
const severity=document.getElementById('mr_sev').value;
const url=document.getElementById('mr_url').value.trim();
const interval=parseInt(document.getElementById('mr_interval').value)||60;
if(!name||!url){toast('\u8bf7\u586b\u5199\u540d\u79f0\u548c URL');return}
const config=type==='http'?{url:url,timeout:5}:type==='system'?{check:'file_not_exists',path:url}:{url:url,judge:''};

}

} else {
await api('/api/user/subscribe/' + trackId, {method:'DELETE'});

}
loadFollows(document.getElementById('contentArea'));
}

async function addFollowStock() {
const input = document.getElementById('followStockInput');
const val = input.value.trim();
if (!val) return;
const code = val.match(/^\d{6}$/) ? val : val;
const name = val.match(/^\d{6}$/) ? '' : val;
await api('/api/watchlist', {method:'POST', body:JSON.stringify({stock_code:code, stock_name:name})});

toast('已添加');
loadFollows(document.getElementById('contentArea'));
}

async function removeFollowStock(code) {

toast('已删除');
loadFollows(document.getElementById('contentArea'));
}

  <div id="polList"><div class="pol-empty"><div class="icon">📜</div><div class="text">选择赛道并点击「分析政策」开始</div></div></div>
</div>`;
}

let _polData = [];
function filterPol(impact){
document.querySelectorAll('#polFilters .fb').forEach(b => b.classList.toggle('active', b.dataset.v === impact));
renderPolList(impact);
}
function renderPolList(filterImpact){
const list = filterImpact ? _polData.filter(p => p.impact === filterImpact) : _polData;
const container = document.getElementById('polList');
const total = _polData.length;
const pos = _polData.filter(p=>p.impact==='利好').length;
const neu = _polData.filter(p=>p.impact==='中性').length;
const neg = _polData.filter(p=>p.impact==='利空').length;
// 更新统计
if(total>0){
  document.getElementById('polStats').style.display='';
  document.getElementById('ps_total').textContent=total;
  document.getElementById('ps_positive').textContent=pos;
  document.getElementById('ps_neutral').textContent=neu;
  document.getElementById('ps_negative').textContent=neg;
  const classified=pos+neu+neg;
  if(classified>0){
    document.getElementById('polBar').style.display='';
    document.getElementById('pb_pos').style.width=(pos/classified*100)+'%';
    document.getElementById('pb_neu').style.width=(neu/classified*100)+'%';
    document.getElementById('pb_neg').style.width=(neg/classified*100)+'%';
  }
}
if(!list.length){container.innerHTML='<div class="pol-empty"><div class="icon">🔍</div><div class="text">暂无符合条件的政策</div></div>';return}
container.innerHTML = list.map(p => {
  const cls = p.impact==='利好'?'positive':p.impact==='利空'?'negative':p.impact?'neutral':'';
  return `<div class="pol-item ${cls}">
  <div class="pol-title">${p.url?`<a href="${esc(p.url)}" target="_blank">${esc(p.title)}</a>`:esc(p.title)}</div>
  <div class="pol-meta">
    <span>📅 ${(p.publish_time||'').slice(0,10)}</span>
    <span>📰 ${esc(p.source||'')}</span>
    ${p.track_name?`<span>🔥 ${esc(p.track_name)}</span>`:''}
  </div>
  <div class="pol-actions">
    ${p.impact?`<span class="pol-tag ${cls}">${p.impact}</span>`:''}
    ${p.category?`<span class="pol-tag category">${esc(p.category)}</span>`:''}
    ${!p.impact?`<span style="font-size:12px;color:#1890ff;cursor:pointer" onclick="classifyOne(${p.id},this)">🤖 AI 分析</span>`:''}
  </div>
  ${p.summary?`<div class="pol-summary">${esc(p.summary)}</div>`:''}
</div>`;}).join('');
}

async function analyzePolicies(){
const trackId = document.getElementById('pol_track').value;
const days = document.getElementById('pol_days').value;
const url = trackId ? "/api/proxy/tracks/"+trackId+"/news?days="+days : "/api/proxy/tracks/1/news?days="+days;
document.getElementById('polList').innerHTML = '<div class="pol-empty"><div class="icon"><span class="pol-spin">⏳</span></div><div class="text">正在加载资讯...</div></div>';
const news = await apiV(url);
const newsItems = news && news.items ? news.items : (Array.isArray(news) ? news : []);
if(!newsItems.length){document.getElementById('polList').innerHTML = '<div class="pol-empty"><div class="icon">📭</div><div class="text">暂无资讯数据</div></div>';return}
_polData = newsItems.map(n => ({...n, impact: '', category: '', summary: '', track_name: ''}));
document.getElementById('polCount').textContent = '共 ' + newsItems.length + ' 条资讯';
document.getElementById('polStats').style.display='';
document.getElementById('ps_total').textContent = newsItems.length;
document.getElementById('ps_positive').textContent = 0;
document.getElementById('ps_neutral').textContent = 0;
document.getElementById('ps_negative').textContent = 0;
document.getElementById('polBar').style.display='none';
renderPolList('');
}

async function classifyOne(newsId, el){
el.innerHTML = '<span class="pol-spin">⏳</span> 分析中...';
el.style.pointerEvents='none';
const newsItem = _polData.find(n => n.id === newsId);
if(!newsItem) return;
try{
  const result = await api('/api/policy/classify', {method:'POST', body: JSON.stringify({content: newsItem.title + ' ' + (newsItem.content||'')})});
  if(result && result.policy && result.policy.is_policy){
    const p = result.policy;
    newsItem.impact = p.impact || '中性';
    newsItem.category = p.category || '';
    newsItem.summary = p.summary || '';
  }
}catch(e){}
renderPolList(document.querySelector('#polFilters .fb.active')?.dataset.v || '');
}

async function batchClassify(){
if(!_polData.length){toast('请先加载资讯数据');return}
let done=0,total=_polData.filter(i=>!i.impact).length,利好=0,利空=0,中性=0;
const progEl=document.getElementById('polProgress');
const progText=document.getElementById('polProgressText');
progEl.classList.add('show');
for(const item of _polData){
  if(item.impact) continue;
  done++;
  progText.textContent=`正在分析 ${done}/${total}... ${item.title.slice(0,20)}`;
  const result = await api('/api/policy/classify', {method:'POST', body: JSON.stringify({content: item.title + ' ' + (item.content||'')})});
  if(result && result.policy && result.policy.is_policy){
    item.impact = result.policy.impact || '中性';
    item.category = result.policy.category || '';
    item.summary = result.policy.summary || '';
    if(item.impact==='利好')利好++; else if(item.impact==='利空')利空++; else 中性++;
  }
  if(done%5===0||done===total) renderPolList(document.querySelector('#polFilters .fb.active')?.dataset.v || '');
}
progEl.classList.remove('show');
renderPolList(document.querySelector('#polFilters .fb.active')?.dataset.v || '');
toast(`✅ 分析完成：🟢利好${利好} ⚪中性${中性} 🔴利空${利空}`);
}

    </div>

async function loadFuncChart() {
    const data = await api('/api/analytics/functions?days=' + analyticsDays);
    const funcs = data.functions || [];
    if (!funcs.length) return;
    const chart = echarts.init(document.getElementById('funcChart'));
    chart.setOption({
        tooltip: {trigger: 'axis', axisPointer: {type: 'shadow'}},
        grid: {top: 10, bottom: 30, left: 80, right: 30},
        xAxis: {type: 'value'},
        yAxis: {type: 'category', data: funcs.map(f => f.name).reverse(), axisLabel: {fontSize: 12}},
        series: [{type: 'bar', data: funcs.map(f => f.count).reverse(), itemStyle: {color: '#1890ff', borderRadius: [0, 4, 4, 0]}}],
        tooltip: {formatter: function(p) {return p.name + ': ' + p.value + ' 次 (' + (funcs.find(f=>f.name===p.name)||{}).percentage + '%)'}}
    });
}

async function loadTrendChart() {
    const data = await api('/api/analytics/trends?days=' + analyticsDays);
    const trends = data.trends || [];
    if (!trends.length) return;
    const chart = echarts.init(document.getElementById('trendChart'));
    chart.setOption({
        tooltip: {trigger: 'axis'},
        legend: {top: 0, right: 0, textStyle: {fontSize: 11}},
        grid: {top: 30, bottom: 30, left: 40, right: 40},
        xAxis: {type: 'category', data: trends.map(t => t.date.slice(5))},
        yAxis: [{type: 'value', name: 'DAU', position: 'left'}, {type: 'value', name: '调用量', position: 'right'}],
        series: [
            {name: 'DAU', type: 'line', smooth: true, data: trends.map(t => t.dau), itemStyle: {color: '#1890ff'}},
            {name: '调用量', type: 'line', smooth: true, yAxisIndex: 1, data: trends.map(t => t.total_calls), itemStyle: {color: '#faad14'}}
        ]
    });
}

async function loadUserTable() {
    const data = await api('/api/analytics/users?days=' + analyticsDays);
    const users = data.users || [];
    const el = document.getElementById('userTable');
    if (!users.length) {el.innerHTML = '<div class="empty">暂无数据</div>'; return;}
    el.innerHTML = '<table class="et"><thead><tr><th>用户</th><th>最近活跃</th><th>使用功能数</th><th>总调用</th><th>日均</th></tr></thead><tbody>' +
        users.map(u => {
            const inactive = u.last_active && new Date(u.last_active) < new Date(Date.now() - 7*86400000);
            return '<tr' + (inactive ? ' style="background:#fff2f0"' : '') + '><td>' + esc(u.user_id) + (inactive ? ' <span style="color:#ff4d4f;font-size:11px">不活跃</span>' : '') + '</td><td>' + (u.last_active || '-').slice(0, 16) + '</td><td>' + u.function_count + '</td><td>' + u.total_calls + '</td><td>' + u.daily_avg + '</td></tr>';
        }).join('') + '</tbody></table>';
}

async function loadColdHotChart() {
    const data = await api('/api/analytics/cold-hot?days=' + analyticsDays);
    const users = data.users || [];
    const functions = data.functions || [];
    const matrix = data.matrix || [];
    if (!users.length || !functions.length) {document.getElementById('coldHotChart').innerHTML = '<div class="empty">暂无数据</div>'; return;}
    const maxVal = Math.max(1, ...matrix.flat());
    const el = document.getElementById('coldHotChart');
    let html = '<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:12px"><thead><tr><th style="padding:6px 10px;background:#fafafa;border:1px solid #f0f0f0"></th>';
    functions.forEach(f => {html += '<th style="padding:6px 10px;background:#fafafa;border:1px solid #f0f0f0;font-weight:500">' + f + '</th>';});
    html += '</tr></thead><tbody>';
    users.forEach((u, ui) => {
        html += '<tr><td style="padding:6px 10px;background:#fafafa;border:1px solid #f0f0f0;font-weight:500">' + esc(u) + '</td>';
        functions.forEach((f, fi) => {
            const val = (matrix[ui] || [])[fi] || 0;
            const intensity = Math.round((val / maxVal) * 100);
            const bg = val === 0 ? '#fff5f5' : 'rgba(24,144,255,' + (intensity / 100 * 0.6 + 0.1).toFixed(2) + ')';
            html += '<td style="padding:6px 10px;border:1px solid #f0f0f0;text-align:center;background:' + bg + ';color:' + (val === 0 ? '#ff4d4f' : '#333') + '">' + (val || '-') + '</td>';
        });
        html += '</tr>';
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;
}
