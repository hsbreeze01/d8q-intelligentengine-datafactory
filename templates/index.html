<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>D8Q 智能资讯平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;background:#f0f2f5;color:#333;display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:#001529;color:rgba(255,255,255,.65);display:flex;flex-direction:column;flex-shrink:0}
.sidebar .logo{padding:16px 20px;font-size:18px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .logo span{font-size:11px;opacity:.5;font-weight:400;margin-left:4px}
.sidebar nav{flex:1;padding:8px 0}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:rgba(255,255,255,.65);text-decoration:none;font-size:14px;border-left:3px solid transparent;transition:all .15s}
.sidebar nav a:hover{color:#fff;background:rgba(255,255,255,.05)}
.sidebar nav a.active{color:#fff;background:rgba(24,144,255,.15);border-left-color:#1890ff}
.sidebar .divider{height:1px;background:rgba(255,255,255,.08);margin:8px 16px}
.sidebar .user-box{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:12px}
.sidebar .user-box .name{color:#fff;font-size:13px;font-weight:500}
.sidebar .user-box .role{color:rgba(255,255,255,.45);margin-top:2px}
.sidebar .user-box .logout{color:#ff6b6b;cursor:pointer;margin-top:4px;font-size:11px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar .title{font-size:16px;font-weight:600}
.topbar .search{padding:6px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;width:220px;outline:none}
.topbar .search:focus{border-color:#1890ff}
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.mc{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mc .label{font-size:13px;color:#999;margin-bottom:8px}
.mc .value{font-size:28px;font-weight:700;color:#1890ff}
.mc .sub{font-size:12px;margin-top:4px}.mc .sub.up{color:#52c41a}.mc .sub.warn{color:#faad14}
.card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.card h3{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card h3 .more{font-size:12px;color:#1890ff;font-weight:400;cursor:pointer;text-decoration:none}
.grid-2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.ni{padding:12px 0;border-bottom:1px solid #f5f5f5}.ni:last-child{border-bottom:none}
.ni .t{font-size:14px;font-weight:500;margin-bottom:4px}
.ni .m{font-size:12px;color:#999}
.ni .s{font-size:13px;color:#666;margin-top:4px;line-height:1.6}
.ni .acts{margin-top:6px;display:flex;gap:12px}.ni .acts a{font-size:12px;color:#1890ff;cursor:pointer;text-decoration:none}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;margin-right:4px}
.tag-policy{background:#fff7e6;color:#fa8c16}.tag-tech{background:#e6f7ff;color:#1890ff}
.tag-funding{background:#f6ffed;color:#52c41a}.tag-market{background:#f9f0ff;color:#722ed1}.tag-report{background:#f0f0f0;color:#666}
.et{width:100%;border-collapse:collapse;font-size:13px}
.et th{text-align:left;padding:10px 12px;background:#fafafa;color:#666;font-weight:500;border-bottom:1px solid #f0f0f0}
.et td{padding:10px 12px;border-bottom:1px solid #f5f5f5}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-ok{background:#f6ffed;color:#52c41a}.badge-info{background:#e6f7ff;color:#1890ff}.badge-err{background:#fff2f0;color:#ff4d4f}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fb{padding:6px 14px;border:1px solid #d9d9d9;border-radius:16px;font-size:12px;cursor:pointer;background:#fff;transition:all .15s}
.fb:hover{border-color:#1890ff;color:#1890ff}.fb.active{background:#1890ff;color:#fff;border-color:#1890ff}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.tc{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .2s;border-left:4px solid #1890ff}
.tc:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.tc .n{font-size:16px;font-weight:600;margin-bottom:12px}
.tc .sc{font-size:24px;font-weight:700;color:#1890ff}
.tc .ch{font-size:13px;margin-left:8px}.tc .ch.up{color:#52c41a}.tc .ch.dn{color:#ff4d4f}
.tc .st{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;font-size:12px;color:#666}
.tc .st b{color:#333;font-weight:500;float:right}
.btn{padding:10px 20px;background:#1890ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px}
.btn:hover{background:#40a9ff}.btn-ghost{background:transparent;color:#1890ff;border:1px solid #1890ff}.btn-ghost:hover{background:#e6f7ff}
.btn-lg{padding:12px 32px;font-size:15px}
.tpl-opts{display:flex;gap:12px;margin-bottom:16px}
.tpl-opt{padding:10px 20px;border:2px solid #e8e8e8;border-radius:8px;cursor:pointer;font-size:13px}
.tpl-opt.active{border-color:#1890ff;background:#e6f7ff;color:#1890ff}
.rcfg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.rcfg .f label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.rcfg .f select{width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none}
.edt-bar{display:flex;gap:4px;padding:8px 12px;background:#fafafa;border:1px solid #e8e8e8;border-radius:6px 6px 0 0}
.edt-bar button{padding:4px 8px;border:none;background:none;cursor:pointer;border-radius:4px;font-size:13px}
.edt-bar button:hover{background:#e8e8e8}
.edt-body{border:1px solid #e8e8e8;border-top:none;border-radius:0 0 6px 6px;padding:20px;min-height:300px;font-size:14px;line-height:1.8;outline:none}
.empty{text-align:center;padding:40px;color:#999;font-size:14px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:6px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.toast.show{opacity:1}.toast.err{background:#fff2f0;color:#ff4d4f;border-color:#ffccc7}
@media(max-width:768px){.sidebar{width:56px}.sidebar .logo span,.sidebar nav a span,.sidebar .user-box{display:none}.sidebar nav a{justify-content:center;padding:12px}}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">🏭 D8Q<span>Pro</span></div>
<nav id="nav"></nav>
<div class="user-box"><div class="name" id="uName">-</div><div class="role" id="uRole">-</div><div class="logout" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')">退出登录</div></div>
</div>
<div class="main">
<div class="topbar"><div class="title" id="pageTitle">概览</div><input class="search" placeholder="搜索资讯、赛道..." id="globalSearch"></div>
<div class="content" id="contentArea"></div>
</div>
<div class="toast" id="toast"></div>
</body>
</html>
<script>
// === 导航与路由 ===
const PAGES=[
{id:'dashboard',icon:'📊',label:'概览',title:'概览'},
{id:'track',icon:'🔥',label:'赛道',title:'赛道热度'},
{id:'feed',icon:'📰',label:'资讯',title:'资讯'},
{id:'weekly',icon:'📝',label:'周报',title:'周报工作台'},
{id:'stock',icon:'📈',label:'个股',title:'个股分析'},
{id:'report',icon:'📑',label:'研报',title:'研报分析'},
{id:'_div'},
{id:'tasks',icon:'⚙️',label:'任务',title:'任务管理',role:'editor'},
{id:'policy',icon:'📜',label:'政策',title:'政策分析'},
{id:'settings',icon:'🔧',label:'设置',title:'系统设置',role:'admin'},
];
let curPage=(location.pathname.replace('/',''))||'dashboard',userRole='viewer';

function initNav(){
const nav=document.getElementById('nav');
nav.innerHTML=PAGES.map(p=>{
if(p.id==='_div')return'<div class="divider"></div>';
if(p.role==='admin'&&userRole!=='admin')return'';
if(p.role==='editor'&&userRole==='viewer')return'';
return`<a href="#" data-p="${p.id}" class="${p.id===curPage?'active':''}">${p.icon} <span>${p.label}</span></a>`;
}).join('');
nav.querySelectorAll('a').forEach(a=>a.onclick=e=>{e.preventDefault();goPage(a.dataset.p)});
}

function goPage(id){
curPage=id;
document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.p===id));
const p=PAGES.find(x=>x.id===id);
document.getElementById('pageTitle').textContent=p?p.title:id;
loadPage(id);
}

function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2500)}
function api(url,opt){return fetch(url,{headers:{'Content-Type':'application/json'},...opt}).then(r=>r.json())}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function tagHtml(type){const m={policy:'政策',funding:'融资',tech:'技术',market:'市场',report:'研报'};return`<span class="tag tag-${type||'tech'}">${m[type]||type||''}</span>`}

// === 页面加载 ===
function loadPage(id){
const area=document.getElementById('contentArea');
const loaders={dashboard:loadDashboard,track:loadTrack,feed:loadFeed,weekly:loadWeekly,stock:loadStock,report:loadReport,tasks:loadTasks,settings:loadSettings,policy:loadPolicy};
if(loaders[id])loaders[id](area);
else area.innerHTML='<div class="empty">页面开发中...</div>';
}

// === Dashboard ===
async function loadDashboard(el){
const[heat,news]=await Promise.all([
api('/api/proxy/tracks/heat/latest'),
api('/api/news?size=5')
]);
const heatData=heat||[];
const newsItems=news.items||[];
const totalNews=news.total||0;
const trackCount=heatData.length;
const alerts=heatData.filter(h=>h.change&&h.change>15).length;

el.innerHTML=`
<div class="metrics">
<div class="mc"><div class="label">今日资讯</div><div class="value">${totalNews}</div><div class="sub up">数据库总量</div></div>
<div class="mc"><div class="label">关注赛道</div><div class="value">${trackCount}</div><div class="sub">活跃追踪中</div></div>
<div class="mc"><div class="label">热度异动</div><div class="value">${alerts}</div><div class="sub warn">${alerts?'有赛道热度突增':'暂无异动'}</div></div>

</div>
<div class="grid-2">
<div class="card"><h3>赛道热度趋势 (7日) <a class="more" onclick="goPage('track')">查看全部 →</a></h3><div id="dashChart" style="height:220px"></div></div>
<div class="card"><h3>今日要闻 <a class="more" onclick="goPage('feed')">更多 →</a></h3>${newsItems.slice(0,5).map(n=>`<div class="ni"><div class="t">${n.url?`<a href="${n.url}" target="_blank" style="color:#333;text-decoration:none">${esc(n.title)}</a>`:esc(n.title)}</div><div class="m">${(n.publish_time||'').slice(5,16)} · ${n.source}</div></div>`).join('')}</div>
</div>
`;
// 渲染图表
loadDashChart(heatData);
// 服务状态卡片 (admin only)
if(userRole==='admin'){loadServiceStatus();}
}

async function loadDashChart(latestHeat){
const data=await api('/api/proxy/tracks/heat?days=7');
if(!data||!data.length)return;
const tracks={};
data.forEach(d=>{if(!tracks[d.name])tracks[d.name]={color:d.color,dates:[],scores:[]};tracks[d.name].dates.push(d.date.slice(5));tracks[d.name].scores.push(d.score)});
const series=Object.entries(tracks).map(([name,v])=>({name,type:'line',smooth:true,data:v.scores,itemStyle:{color:v.color},lineStyle:{color:v.color}}));
const dates=Object.values(tracks)[0]?.dates||[];
const chart=echarts.init(document.getElementById('dashChart'));
chart.setOption({tooltip:{trigger:'axis'},legend:{top:0,right:0,textStyle:{fontSize:11}},grid:{top:30,bottom:20,left:40,right:20},xAxis:{type:'category',data:dates},yAxis:{type:'value',max:100},series});
}

// === 赛道页 ===
async function loadTrack(el){
const[tracks,latest]=await Promise.all([api('/api/proxy/tracks'),api('/api/proxy/tracks/heat/latest')]);
el.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<div class="filters"><span class="fb active" onclick="loadTrackChart(7)">7天</span><span class="fb" onclick="loadTrackChart(30)">30天</span><span class="fb" onclick="loadTrackChart(90)">90天</span></div>
</div>
<div class="card"><h3>热度趋势对比</h3><div id="trackChart" style="height:250px"></div></div>
<div class="tg">${(latest||[]).map(t=>`
<div class="tc" style="border-left-color:${t.color||'#1890ff'}" onclick="goPage('feed')">
<div class="n">${esc(t.name)}</div>
<span class="sc">${t.score!=null?t.score:'-'}</span>
<span class="ch ${(t.change||0)>=0?'up':'dn'}">${t.change!=null?(t.change>=0?'↑':'↓')+Math.abs(t.change).toFixed(1):''}</span>
<div class="st"><span>资讯 <b>${t.news_count||0}条</b></span><span>政策 <b>${t.policy_count||0}条</b></span><span>研报 <b>${t.report_count||0}次</b></span><span>融资 <b>${t.funding_count||0}笔</b></span></div>
</div>`).join('')}</div>`;
loadTrackChart(7);
}

async function loadTrackChart(days){
document.querySelectorAll('.filters .fb').forEach((b,i)=>b.classList.toggle('active',[7,30,90][i]===days));
const data=await api('/api/proxy/tracks/heat?days='+days);
if(!data||!data.length)return;
const tracks={};
data.forEach(d=>{if(!tracks[d.name])tracks[d.name]={color:d.color,dates:[],scores:[]};tracks[d.name].dates.push(d.date.slice(5));tracks[d.name].scores.push(d.score)});
const series=Object.entries(tracks).map(([name,v])=>({name,type:'line',smooth:true,data:v.scores,itemStyle:{color:v.color},lineStyle:{color:v.color},areaStyle:{color:v.color,opacity:0.05}}));
const dates=Object.values(tracks)[0]?.dates||[];
const chart=echarts.init(document.getElementById('trackChart'));
chart.setOption({tooltip:{trigger:'axis'},legend:{top:0,right:0},grid:{top:30,bottom:20,left:40,right:20},xAxis:{type:'category',data:dates},yAxis:{type:'value',max:100},series});
}

// === 资讯页 ===
let feedPage=1,feedSubject='',feedType='';
async function loadFeed(el){
const meta=await api('/api/meta');
el.innerHTML=`
<div class="filters" id="fSubjects"><span class="fb active" data-v="">全部赛道</span>${(meta.subjects||[]).map(s=>`<span class="fb" data-v="${s}">${s}</span>`).join('')}</div>
<div class="filters" id="fTypes"><span class="fb active" data-v="">全部分类</span><span class="fb" data-v="policy">政策</span><span class="fb" data-v="funding">融资</span><span class="fb" data-v="tech">技术</span><span class="fb" data-v="market">市场</span><span class="fb" data-v="report">研报</span></div>
<div class="card" id="feedList"><div class="empty">加载中...</div></div>
<div id="feedPager" style="text-align:center;margin-top:12px"></div>`;
document.querySelectorAll('#fSubjects .fb').forEach(b=>b.onclick=()=>{document.querySelectorAll('#fSubjects .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');feedSubject=b.dataset.v;feedPage=1;renderFeed()});
document.querySelectorAll('#fTypes .fb').forEach(b=>b.onclick=()=>{document.querySelectorAll('#fTypes .fb').forEach(x=>x.classList.remove('active'));b.classList.add('active');feedType=b.dataset.v;feedPage=1;renderFeed()});
feedPage=1;renderFeed();
}

async function renderFeed(){
let url=`/api/news?page=${feedPage}&size=10`;
if(feedSubject)url+=`&subject=${feedSubject}`;
const data=await api(url);
const items=(data.items||[]).filter(n=>!feedType||n.news_type===feedType);
document.getElementById('feedList').innerHTML=items.length?items.map(n=>`
<div class="ni">
<div class="m">${tagHtml(n.news_type)}<span style="font-size:12px;color:#999">${(n.publish_time||'').slice(0,16)} · ${n.source} · ${n.subject}</span></div>
<div class="t">${n.url?`<a href="${n.url}" target="_blank" style="color:#333;text-decoration:none">${esc(n.title)}</a>`:esc(n.title)}</div>
${n.ai_summary?`<div class="s" style="font-size:13px;color:#52c41a;margin:4px 0">💡 ${esc(n.ai_summary)}</div>`:(n.content?`<div class="s" style="font-size:13px;color:#666;margin:4px 0">${esc(n.content.slice(0,100))}${n.content.length>100?"...":""}</div>`:"")}${n.url?`<div style="margin-top:4px"><a href="${n.url}" target="_blank" style="font-size:12px;color:#1890ff;text-decoration:none">查看原文 →</a></div>`:""}
<div class="acts"><a onclick="toast('已加入周报素材')">📝 加入周报</a><a onclick="toast('已标记')">⭐ 标记</a></div>
</div>`).join(''):'<div class="empty">暂无数据</div>';
const pages=Math.ceil((data.total||0)/10);
document.getElementById('feedPager').innerHTML=pages>1?Array.from({length:Math.min(pages,10)},(_,i)=>`<span class="fb${feedPage===i+1?' active':''}" onclick="feedPage=${i+1};renderFeed()" style="display:inline-block;margin:2px">${i+1}</span>`).join(''):'';
}
</script>
<script>
// === 周报工作台 ===
async function loadWeekly(el){
const tracks=await api('/api/proxy/tracks');
el.innerHTML=`
<div class="card"><h3>生成配置</h3>
<div class="rcfg"><div class="f"><label>赛道</label><select id="wTrack">${(tracks||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
<div class="f"><label>时间范围</label><select id="wRange"><option value="7">本周</option><option value="14">近两周</option><option value="30">近30天</option></select></div>
<div class="f"><label>语言</label><select><option>中文</option><option>English</option></select></div></div>
<div style="margin-bottom:12px;font-size:13px;color:#666">选择模板：</div>
<div class="tpl-opts"><div class="tpl-opt active" data-t="standard">📋 标准周报</div><div class="tpl-opt" data-t="committee">📊 投委会汇报</div><div class="tpl-opt" data-t="lp">📄 LP简报</div></div>
<div style="text-align:center"><button class="btn btn-lg" onclick="genWeekly()">🚀 一键生成周报</button></div></div>
<div class="card"><h3>编辑区 <a class="more" onclick="exportWeekly()">导出 Markdown</a></h3>
<div class="edt-bar"><button><b>B</b></button><button><i>I</i></button><button>H1</button><button>H2</button><button>•</button><button>表格</button></div>
<div class="edt-body" contenteditable="true" id="weeklyEditor"><p style="color:#999">点击"一键生成"开始...</p></div></div>`;
document.querySelectorAll('.tpl-opts .tpl-opt').forEach(o=>o.onclick=()=>{document.querySelectorAll('.tpl-opt').forEach(x=>x.classList.remove('active'));o.classList.add('active')});
}

async function genWeekly(){
const trackId=document.getElementById('wTrack').value;
const days=document.getElementById('wRange').value;
const editor=document.getElementById('weeklyEditor');
editor.innerHTML='<p style="color:#999">⏳ 正在生成周报，请稍候...</p>';
try{
const data=await api('/api/weekly/generate',{method:'POST',body:JSON.stringify({track_id:parseInt(trackId),days:parseInt(days)})});
if(data.content){editor.innerText=data.content;toast('周报生成成功')}
else{editor.innerHTML='<p style="color:#ff4d4f">生成失败: '+(data.error||'未知错误')+'</p>';toast(data.error||'生成失败',true)}
}catch(e){editor.innerHTML='<p style="color:#ff4d4f">请求失败</p>';toast('网络错误',true)}
}

function exportWeekly(){
const content=document.getElementById('weeklyEditor').innerText;
const blob=new Blob([content],{type:'text/markdown'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='weekly_report.md';a.click();
}

// === 个股（自选股+分析+关联资讯） ===
function loadStock(el){
el.innerHTML=`
<div class="card"><h3>搜索分析</h3>
<div style="display:flex;gap:12px"><input class="search" style="flex:1;width:auto" placeholder="输入股票代码或名称，如 002594、北特科技" id="stockInput" onkeydown="if(event.key==='Enter')doStock()"><button class="btn" onclick="doStock()">分析</button><button class="btn-ghost" style="padding:8px 16px" onclick="addToWatchlist()">+ 加入自选</button></div></div>
<div class="card"><h3>我的自选 <a class="more" onclick="loadStock(document.getElementById('contentArea'))">刷新</a></h3><div id="watchlistArea">加载中...</div></div>
<div id="stockResult"></div>`;
loadWatchlist();
}
async function loadWatchlist(){
const data=await api('/api/watchlist');
const el=document.getElementById('watchlistArea');

async function doStock(){
const code=document.getElementById('stockInput').value.trim();
if(!code)return;
document.getElementById('stockResult').innerHTML='<div class="card"><div class="empty">⏳ 分析中，请稍候...</div></div>';
const data=await api('/api/stock/comprehensive',{method:'POST',body:JSON.stringify({stock_code:code})});
if(!data||data.error){document.getElementById('stockResult').innerHTML='<div class="card"><div class="empty">分析失败: '+(data?data.error:'网络错误')+'</div></div>';return}
const name=data.stock_name||data.stock_code||code;
const score=data.score||0;
const scoreColor=score>=70?'#52c41a':score>=40?'#faad14':'#ff4d4f';
const riskColors={低:'#52c41a',中:'#faad14',高:'#ff4d4f'};
const signalMap={bullish:'看多 📈',bearish:'看空 📉',neutral:'中性 ➡️'};
const signalColor={bullish:'#52c41a',bearish:'#ff4d4f',neutral:'#999'};
let html='<div class="card"><h3>'+esc(name)+' ('+esc(data.stock_code||'')+') <span style="font-size:12px;color:#999;font-weight:400">'+esc((data.analyzed_at||'').slice(0,16))+'</span></h3>';
// 评分+风险+摘要
html+='<div style="display:flex;gap:24px;align-items:center;margin-bottom:16px"><div style="text-align:center"><div style="font-size:36px;font-weight:700;color:'+scoreColor+'">'+score+'</div><div style="font-size:12px;color:#999">综合评分</div></div>';
html+='<div style="text-align:center"><div style="font-size:18px;font-weight:600;color:'+(riskColors[data.risk_level]||'#999')+'">'+esc(data.risk_level||'-')+'</div><div style="font-size:12px;color:#999">风险等级</div></div>';
html+='<div style="flex:1;font-size:14px;line-height:1.8;color:#333;padding:12px;background:#f8f9fa;border-radius:6px;border-left:4px solid '+scoreColor+'">'+esc(data.summary||'')+'</div></div>';
// 短中长期信号
const terms=[{key:'short_term',label:'短期'},{key:'mid_term',label:'中期'},{key:'long_term',label:'长期'}];
html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">';
terms.forEach(t=>{const d2=data[t.key]||{};const sig=d2.signal||'neutral';
html+='<div style="border:1px solid #f0f0f0;border-radius:8px;padding:14px"><div style="font-size:13px;color:#666;margin-bottom:6px">'+t.label+' <span style="color:'+(signalColor[sig]||'#999')+';font-weight:600">'+(signalMap[sig]||sig)+'</span></div>';
html+='<div style="font-size:13px;color:#555;margin-bottom:8px">'+esc(d2.outlook||'')+'</div>';
if(d2.key_factors&&d2.key_factors.length){html+='<ul style="margin:0;padding-left:16px;font-size:12px;color:#666">';d2.key_factors.forEach(f=>{html+='<li>'+esc(f)+'</li>'});html+='</ul>'}
html+='</div>'});
html+='</div>';
// 风险提示
if(data.risk_alerts&&data.risk_alerts.length){html+='<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:500;color:#ff4d4f;margin-bottom:6px">⚠️ 风险提示</div><ul style="margin:0;padding-left:16px;font-size:13px;color:#666">';data.risk_alerts.forEach(r=>{html+='<li>'+esc(r)+'</li>'});html+='</ul></div>'}
html+='</div>';
// 关联资讯
try{const news=await api('/api/news?size=5&keyword='+encodeURIComponent(data.stock_name||code));
if(news&&news.items&&news.items.length){html+='<div class="card"><h3>📰 关联资讯</h3>';news.items.forEach(n=>{html+='<div class="ni"><div class="m">'+tagHtml(n.news_type)+'<span style="font-size:12px;color:#999">'+(n.publish_time||'').slice(0,16)+' · '+n.source+'</span></div><div class="t">'+esc(n.title)+'</div>'+(n.ai_summary?'<div class="s" style="font-size:12px;color:#666">💡 '+esc(n.ai_summary)+'</div>':'')+'</div>'});html+='</div>'}}catch(e){}
document.getElementById('stockResult').innerHTML=html;
}

<span class="fb" onclick="settingsTab(this,'users')">👥 用户管理</span>
</div>
<div id="st-cfg"><div class="card"><h3>LLM 配置</h3>
<div class="rcfg"><div class="f"><label>模型</label><input id="sModel" value="${cfg.llm?.model||''}"></div>
<div class="f"><label>Temperature</label><input id="sTemp" type="number" step="0.1" value="${cfg.llm?.temperature||0.7}"></div>
<div class="f"><label>Max Tokens</label><input id="sTokens" type="number" value="${cfg.llm?.max_tokens||2000}"></div></div>
<div style="margin-bottom:12px"><label style="font-size:12px;color:#666">API Base URL</label><input class="search" style="width:100%;margin-top:4px" id="sUrl" value="${cfg.llm?.base_url||''}"></div>
<div style="text-align:right"><button class="btn" onclick="saveSettings()">保存配置</button></div></div></div>
<div id="st-prompts" style="display:none"><div id="promptsPanel">加载中...</div></div>
<div id="st-users" style="display:none"><div class="card"><h3>用户管理</h3><div id="userMgmt">加载中...</div></div></div>`;
loadUserMgmt();
loadServiceStatus();
}
function settingsTab(btn,tab){
btn.parentElement.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.getElementById('st-cfg').style.display=tab==='cfg'?'':'none';
document.getElementById('st-prompts').style.display=tab==='prompts'?'':'none';
document.getElementById('st-users').style.display=tab==='users'?'':'none';
if(tab==='prompts'&&!window._pLoaded){loadPromptsPanel();window._pLoaded=true;}
if(tab==='users')loadUserMgmt();
}
var _pAll={},_pSvc='all';
const _pNames={agent:'Agent 数据智能',shark:'Shark 股票数据',compass:'Compass 金融分析',factory:'Factory 资讯工厂'};
async function loadPromptsPanel(){
const d=await api('/api/prompts/all');
if(d.success) _pAll=d.services;
renderPromptsPanel();
}
function renderPromptsPanel(){
let tabs='<div class="filters" style="margin-bottom:12px"><span class="fb '+(_pSvc==='all'?'active':'')+'" onclick="_pSvcSwitch(this,\'all\')">全部</span>';
Object.keys(_pNames).forEach(s=>{const cnt=_pAll[s]&&typeof _pAll[s]==='object'&&!_pAll[s].error?Object.keys(_pAll[s]).length:0;
tabs+=`<span class="fb ${_pSvc===s?'active':''}" onclick="_pSvcSwitch(this,'${s}')">${_pNames[s]} (${cnt})</span>`;});
tabs+='</div>';
let items=[];
const svcs=_pSvc==='all'?Object.keys(_pAll):[_pSvc];
svcs.forEach(svc=>{const data=_pAll[svc];if(!data||data.error||typeof data!=='object')return;
Object.keys(data).forEach(key=>items.push({svc,key,cfg:data[key]}));});
if(!items.length){document.getElementById('promptsPanel').innerHTML=tabs+'<div class="empty">暂无配置</div>';return;}
let h=tabs;
items.forEach((it,i)=>{
const badges={agent:'tag-policy',shark:'tag-tech',compass:'tag-market',factory:'tag-report'};
h+=`<div class="card" style="margin-bottom:10px;padding:14px 20px" id="pc-${i}"><div style="display:flex;align-items:center;gap:8px">
<span class="tag ${badges[it.svc]||''}">${it.svc}</span><b style="font-size:14px;color:#1890ff">${it.cfg.name||it.key}</b>
<span style="color:#ccc;font-size:11px">v${it.cfg.version||1}</span>
<span style="font-size:12px;color:#999;margin-left:4px">${it.cfg.description||''}</span>
<a style="margin-left:auto;font-size:12px;color:#1890ff;cursor:pointer" onclick="togglePEdit(${i})">编辑</a></div>
<div id="pe-${i}" style="display:none;margin-top:14px;padding-top:14px;border-top:1px dashed #e8e8e8">
<div class="rcfg"><div class="f"><label>模型</label><input id="pm-${i}" value="${it.cfg.model||''}"></div>
<div class="f"><label>Temperature</label><input id="pt-${i}" type="number" step="0.1" value="${it.cfg.temperature||0.3}"></div>
<div class="f"><label>Max Tokens</label><input id="pk-${i}" type="number" value="${it.cfg.max_tokens||2000}"></div></div>
<div style="margin-bottom:10px"><label style="font-size:12px;color:#666">System Prompt</label><textarea class="search" style="width:100%;margin-top:4px;padding:10px;font-family:inherit;line-height:1.5;min-height:80px;resize:vertical" id="ps-${i}">${it.cfg.system||''}</textarea></div>
<div style="margin-bottom:10px"><label style="font-size:12px;color:#666">Template（支持 {{ var }} 变量）</label><textarea class="search" style="width:100%;margin-top:4px;padding:10px;font-family:monospace;line-height:1.5;min-height:100px;resize:vertical" id="ptl-${i}">${it.cfg.template||''}</textarea></div>
<div style="text-align:right;display:flex;gap:8px;justify-content:flex-end">
<button class="btn" style="font-size:12px;padding:6px 16px" onclick="savePromptCfg('${it.svc}','${it.key}',${i})">💾 保存</button>
<button class="btn-ghost" style="font-size:12px;padding:6px 16px" onclick="togglePEdit(${i})">取消</button></div>
</div></div>`;
});
document.getElementById('promptsPanel').innerHTML=h;
}
function _pSvcSwitch(btn,svc){_pSvc=svc;renderPromptsPanel();}
function togglePEdit(i){const el=document.getElementById('pe-'+i);el.style.display=el.style.display==='none'?'':'none';}
async function savePromptCfg(svc,key,i){
const body={name:document.querySelector('#pc-'+i+' b').textContent,version:1,
model:document.getElementById('pm-'+i).value,temperature:parseFloat(document.getElementById('pt-'+i).value),
max_tokens:parseInt(document.getElementById('pk-'+i).value),system:document.getElementById('ps-'+i).value,
template:document.getElementById('ptl-'+i).value};
if(_pAll[svc]&&_pAll[svc][key]&&_pAll[svc][key].description)body.description=_pAll[svc][key].description;
const url=svc==='factory'?'/api/prompts/'+key:'/api/prompts/'+svc+'/'+key;
const r=await api(url,{method:'PUT',body:JSON.stringify(body)});
if(r.success){toast('保存成功 ✅');_pAll[svc][key]=Object.assign({},_pAll[svc][key],body);}
else toast(r.error||'保存失败');
}
async function saveSettings(){
await api('/api/llm-config',{method:'PUT',body:JSON.stringify({llm:{model:document.getElementById('sModel').value,temperature:parseFloat(document.getElementById('sTemp').value),max_tokens:parseInt(document.getElementById('sTokens').value),base_url:document.getElementById('sUrl').value}})});
toast('配置已保存');
}
async function loadUserMgmt(){
const users=await api('/api/auth/users');
document.getElementById('userMgmt').innerHTML=`<div style="margin-bottom:12px"><button class="btn" style="font-size:12px;padding:6px 14px" onclick="addUser()">+ 新增用户</button></div>
<table class="et"><thead><tr><th>用户名</th><th>角色</th><th>状态</th><th>操作</th></tr></thead>
<tbody>${(users||[]).map(u=>`<tr><td>${esc(u.username)}</td><td><span class="badge badge-info">${u.role}</span></td>
<td>${u.frozen?'<span style="color:#ff4d4f">🔒 已冻结</span>':'<span style="color:#52c41a">正常</span>'}</td>
<td style="white-space:nowrap">
<button class="btn-ghost" style="padding:3px 8px;font-size:12px" onclick="freezeUser('${u.username}',${u.frozen})">${u.frozen?'解冻':'冻结'}</button>
<button class="btn-ghost" style="padding:3px 8px;font-size:12px" onclick="resetPw('${u.username}')">重置密码</button>
<button class="btn-ghost" style="padding:3px 8px;font-size:12px;color:#ff4d4f" onclick="delUser('${u.username}')">删除</button>
</td></tr>`).join('')}</tbody></table>`;
}
async function addUser(){
const el=document.getElementById('userMgmt');
if(document.getElementById('addUserForm'))return;
const form=document.createElement('div');
form.id='addUserForm';
form.style.cssText='background:#f9fafb;border:1px solid #e8e8e8;border-radius:8px;padding:16px;margin-bottom:16px';
form.innerHTML=`<div style="font-weight:500;margin-bottom:12px">新增用户</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div><label style="font-size:12px;color:#666">用户名</label><input id="nu_name" class="search" style="width:100%;margin-top:4px;padding:8px 10px" placeholder="输入用户名"></div>
<div><label style="font-size:12px;color:#666">密码（≥8位）</label><input id="nu_pass" type="password" class="search" style="width:100%;margin-top:4px;padding:8px 10px" placeholder="输入密码"></div>
<div><label style="font-size:12px;color:#666">角色</label><select id="nu_role" class="search" style="width:100%;margin-top:4px;padding:8px 10px"><option value="viewer">viewer - 只读</option><option value="editor">editor - 可编辑</option><option value="admin">admin - 管理员</option></select></div>
</div>
<div style="margin-top:12px;display:flex;gap:8px">
<button class="btn" style="font-size:12px;padding:6px 16px" onclick="submitAddUser()">确认创建</button>
<button class="btn-ghost" style="font-size:12px;padding:6px 16px" onclick="document.getElementById('addUserForm').remove()">取消</button>
</div>`;
el.insertBefore(form,el.firstChild);
document.getElementById('nu_name').focus();
}
async function submitAddUser(){
const username=document.getElementById('nu_name').value.trim();
const password=document.getElementById('nu_pass').value;
const role=document.getElementById('nu_role').value;
if(!username){toast('请输入用户名');return}
if(password.length<8){toast('密码至少8位');return}
const r=await api('/api/auth/users',{method:'POST',body:JSON.stringify({username,password,role})});
if(r.error){toast(r.error)}else{toast('用户 '+username+' 创建成功');loadUserMgmt()}
}
async function freezeUser(name,frozen){
if(!confirm(frozen?'确认解冻？':'确认冻结该用户？'))return;
await api('/api/auth/users/'+name+'/freeze',{method:'POST'});
toast(frozen?'已解冻':'已冻结');loadUserMgmt();
}
async function delUser(name){
if(!confirm('确认删除用户 '+name+' ？此操作不可恢复'))return;
const r=await api('/api/auth/users/'+name,{method:'DELETE'});
if(r.error){toast(r.error)}else{toast('已删除');loadUserMgmt()}
}
async function resetPw(name){
const pw=prompt('新密码(≥8位):');if(!pw)return;
const r=await api('/api/auth/users/'+name+'/password',{method:'PUT',body:JSON.stringify({password:pw})});
if(r&&r.error){toast(r.error)}else{toast('已重置')}
}

// === 服务状态 (admin) ===
async function loadServiceStatus(){
try{const d=await api('/api/service-status');if(!d.services)return;
const el=document.getElementById('contentArea');
const svcs=d.services;
const html=Object.entries(svcs).map(([name,s])=>{
const ok=s.status==='ok'||s.status==='active';
return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5"><span style="font-size:13px">${name}${s.port?' <span style=color:#999;font-size:11px>:'+s.port+'</span>':''}</span><span class="badge ${ok?'badge-ok':'badge-err'}">${ok?'● 正常':'● 异常'}</span></div>`;
}).join('');
const card=document.createElement('div');card.className='card';card.style.marginTop='16px';
card.innerHTML=`<h3>🖥️ 服务状态 <span style="font-size:11px;color:#999;font-weight:400">更新于 ${d.timestamp||''}</span></h3>${html}`;
el.appendChild(card);
}catch(e){}}

// === 初始化 ===
async function init(){
try{const me=await api('/api/auth/me');
document.getElementById('uName').textContent=me.username||'-';
document.getElementById('uRole').textContent=({admin:'管理员',editor:'编辑',viewer:'只读'}[me.role])||me.role;
userRole=me.role||'viewer';
}catch(e){}
initNav();
loadPage(curPage);

// === 政策分析 ===
async function loadPolicy(el){
const tracks = await api("/api/proxy/tracks");
var options = '<option value="">全部赛道</option>';
(tracks||[]).forEach(function(t){options += '<option value="'+t.id+'">'+t.name+'</option>';});
el.innerHTML = `
<div class="card"><h3>📜 政策分析 <span style="font-size:12px;color:#999;font-weight:400">自动识别政策类资讯并分析影响</span></h3>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
    <select id="pol_track" class="search" style="width:200px">${options}</select>
    <select id="pol_days" class="search" style="width:120px">
      <option value="7">近7天</option>
      <option value="30" selected>近30天</option>
      <option value="90">近90天</option>
    </select>
    <button class="btn" onclick="analyzePolicies()">🔍 分析政策</button>
    <button class="btn btn-ghost" onclick="batchClassify()">🤖 批量AI识别</button>
  </div>
  <div id="polStats" style="display:flex;gap:16px;margin-bottom:16px"></div>
</div>
<div class="card"><h3>政策列表 <span id="polCount" style="font-size:12px;color:#999;font-weight:400"></span></h3>
  <div class="filters" id="polFilters">
    <span class="fb active" data-v="" onclick="filterPol('')">全部</span>
    <span class="fb" data-v="利好" onclick="filterPol('利好')">🟢 利好</span>
    <span class="fb" data-v="中性" onclick="filterPol('中性')">⚪ 中性</span>
    <span class="fb" data-v="利空" onclick="filterPol('利空')">🔴 利空</span>
  </div>
  <div id="polList"><div class="empty">选择赛道并点击「分析政策」开始</div></div>
</div>`;
}

let _polData = [];
function filterPol(impact){
document.querySelectorAll('#polFilters .fb').forEach(b => b.classList.toggle('active', b.dataset.v === impact));
renderPolList(impact);
}
function renderPolList(filterImpact){
const list = filterImpact ? _polData.filter(p => p.impact === filterImpact) : _polData;
const container = document.getElementById('polList');
if(!list.length){container.innerHTML = '<div class="empty">暂无符合条件的政策</div>';return}
container.innerHTML = list.map(p => `
<div class="ni" style="border-left:3px solid ${p.impact==='利好'?'#52c41a':p.impact==='利空'?'#ff4d4f':'#999'};padding-left:12px">
  <div class="t">${p.url?`<a href="${esc(p.url)}" target="_blank" style="color:#333;text-decoration:none">${esc(p.title)}</a>`:esc(p.title)}</div>
  <div class="m">${(p.publish_time||'').slice(0,16)} · ${p.source} · ${p.category||'未分类'}</div>
  ${p.summary?`<div class="s" style="font-size:12px;color:#666;margin-top:4px">${esc(p.summary)}</div>`:''}
  <div style="margin-top:6px"><span class="badge ${p.impact==='利好'?'badge-ok':p.impact==='利空'?'badge-err':'badge-info'}">${p.impact||'未分析'}</span>
  ${p.track_name?`<span style="font-size:11px;color:#999;margin-left:8px">${esc(p.track_name)}</span>`:''}
  <span style="font-size:11px;color:#1890ff;cursor:pointer;margin-left:8px" onclick="classifyOne(${p.id},this)">🤖 AI分析</span>
  </div>
</div>`).join('');
}

async function analyzePolicies(){
const trackId = document.getElementById('pol_track').value;
const days = document.getElementById('pol_days').value;
const url = trackId ? "/api/proxy/tracks/"+trackId+"/news?days="+days : "/api/proxy/tracks/1/news?days="+days;
document.getElementById('polList').innerHTML = '<div class="empty">加载中...</div>';
const news = await api(url);
const newsItems = news && news.items ? news.items : (Array.isArray(news) ? news : []);
if(!newsItems.length){document.getElementById('polList').innerHTML = '<div class="empty">暂无资讯数据</div>';return}
// 显示全部资讯，由AI识别哪些是政策类
_polData = newsItems.map(n => ({...n, impact: '', category: '', summary: '', track_name: ''}));
document.getElementById('polCount').textContent = '共 ' + newsItems.length + ' 条资讯，点击「批量AI识别」筛选政策类';
const statsEl = document.getElementById('polStats');
statsEl.innerHTML = '<div style="padding:8px 16px;background:#f6ffed;border-radius:6px;font-size:13px">📰 共 '+newsItems.length+' 条资讯</div>';
renderPolList('');
}

async function classifyOne(newsId, el){
el.textContent = '分析中...';
const newsItem = _polData.find(n => n.id === newsId);
if(!newsItem) return;
const result = await api('/api/policy/classify', {method:'POST', body: JSON.stringify({content: newsItem.title + ' ' + (newsItem.content||'')})});
if(result && result.policy && result.policy.is_policy){
const p = result.policy;
newsItem.impact = p.impact || '中性';
newsItem.category = p.category || '';
newsItem.summary = p.summary || '';
el.textContent = '✅ 已分析';
renderPolList(document.querySelector('#polFilters .fb.active')?.dataset.v || '');
} else {
el.textContent = '非政策';
}
}

async function batchClassify(){
if(!_polData.length){toast('请先分析政策', true);return}
let done = 0,利好=0,利空=0,中性=0;
document.querySelectorAll('#polList .ni').forEach(ni => {
const btn = ni.querySelector('span[onclick^="classifyOne"]');
if(btn) btn.textContent = '⏳';
});
for(const item of _polData){
if(item.impact) continue;
const result = await api('/api/policy/classify', {method:'POST', body: JSON.stringify({content: item.title + ' ' + (item.content||'')})});
if(result && result.policy && result.policy.is_policy){
item.impact = result.policy.impact || '中性';
item.category = result.policy.category || '';
item.summary = result.policy.summary || '';
if(item.impact==='利好')利好++; else if(item.impact==='利空')利空++; else 中性++;
}
done++;
}
document.getElementById('polStats').innerHTML = `
<div style="padding:8px 16px;background:#f6ffed;border-radius:6px;font-size:13px">✅ 批量分析完成</div>
<div style="padding:8px 16px;background:#f6ffed;border-radius:6px;font-size:13px">🟢 利好: ${利好}</div>
<div style="padding:8px 16px;background:#f0f5ff;border-radius:6px;font-size:13px">⚪ 中性: ${中性}</div>
<div style="padding:8px 16px;background:#fff2f0;border-radius:6px;font-size:13px">🔴 利空: ${利空}</div>`;
renderPolList(document.querySelector('#polFilters .fb.active')?.dataset.v || '');
toast('批量分析完成: 利好'+利好+' 利空'+利空+' 中性'+中性);
}



init();
</script>
